<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Master PRO 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Rajdhani:wght@700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #010409; color: white; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        
        /* 🎴 JUMBO CARD GRID 🎴 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px; padding: 40px; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 40px; font-weight: 900; cursor: pointer; border: 4px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 80px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; overflow: hidden; }
        .grid-item:hover { transform: scale(1.08); border-color: #fff; box-shadow: 0 25px 50px rgba(251,191,36,0.3); z-index: 10; }
        
        .card-VIP { background: linear-gradient(135deg, #4f46e5, #1e1b4b); }
        .card-Gold { background: linear-gradient(135deg, #d97706, #451a03); }
        .card-Silver { background: linear-gradient(135deg, #cbd5e1, #475569); color: black; }
        
        .pending-card { background: #facc15 !important; color: black !important; border: 8px solid #fff; pointer-events: none; animation: pulse 1.5s infinite; } 
        .sold-card { background: #ef4444 !important; opacity: 0.5; pointer-events: none; border: 8px solid #7f1d1d; } 

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { width: 14px; } ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // ⚠️ NEW APP URL (Do Not Change) ⚠️
        const APP_URL = "https://script.google.com/macros/s/AKfycbwOQfdebHIIv6ud5M6arLov7a5MTnurlBaB-sGvrKOkspn2FC4ouoK_yDRpVpEqhjlAFw/exec";
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11UVWUzSUwI2mm9tsBMaNARgUnfwIZ5TKDaHsKb4Cl58/export?format=csv";
        
        const ADMINS = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020" };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [activeTab, setActiveTab] = useState('ALL'); 
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(null);
            const [successModal, setSuccessModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [paymentMode, setPaymentMode] = useState("");
            const [localLocks, setLocalLocks] = useState(new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]')));

            const loadData = () => {
                fetch(CSV_URL + "?t=" + Date.now()).then(r => r.text()).then(csv => {
                    const rows = csv.split('\n').map(r => r.split(','));
                    let temp = [];
                    for(let i=1; i<=1000; i++) {
                        let rD = rows.find(r => r[0] == i) || [];
                        let s = rD[4]?.trim() || 'Available';
                        if(s === "सॉल्ड") s = "Sold"; if(s === "पेंडिंग") s = "Pending";
                        let cat = i <= 100 ? "VIP Card" : i <= 600 ? "Gold Card" : "Silver Card";
                        temp.push({ 
                            n: i, status: s, cat, price: rD[16] || (i<=100?500:i<=600?100:50), 
                            d: { name: rD[6], mob: rD[7], dob: rD[8], vill: rD[9], adhar: rD[10], pan: rD[11], pay: rD[12] } 
                        });
                    }
                    setCards(temp); setLoading(false);
                });
            };

            useEffect(() => { loadData(); const itvl = setInterval(loadData, 10000); return () => clearInterval(itvl); }, []);

            const bookCard = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const n = selected.n;
                
                // INSTANT LOCK LOGIC
                const newLocks = new Set(localLocks).add(n);
                setLocalLocks(newLocks);
                localStorage.setItem('dps_locks', JSON.stringify([...newLocks]));
                
                const params = new URLSearchParams(Object.fromEntries(fd));
                params.append("action", "BOOK"); params.append("S_No", n.toString()); 
                params.append("Category", selected.cat); params.append("Base_Price", selected.price);
                params.append("Payment_Mode", paymentMode);
                
                await fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                setSuccessModal({ n, name: fd.get("Customer_Name") });
                setSelected(null); setPaymentMode("");
            };

            const renderCard = (c) => {
                const isLocked = localLocks.has(c.n) || c.status === 'Pending';
                const s = c.status === 'Sold' ? 'Sold' : isLocked ? 'Pending' : 'Available';
                const color = s === 'Sold' ? 'sold-card' : s === 'Pending' ? 'pending-card' : `card-${c.cat.split(' ')[0]}`;
                
                return (
                    <div key={c.n} onClick={s === 'Available' ? () => setSelected(c) : undefined} className={`grid-item ${color}`}>
                        <span className="z-10 relative">{c.n}</span>
                        {s === 'Pending' && <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/40"><i className="fa-solid fa-clock text-7xl text-yellow-300 mb-2"></i><span className="text-xl font-black bg-black/80 px-4 py-1 rounded text-white">PENDING</span></div>}
                        {s === 'Sold' && <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60"><i className="fa-solid fa-lock text-7xl text-red-400 mb-2"></i><span className="text-xl font-black bg-black/80 px-4 py-1 rounded text-white">SOLD</span></div>}
                        {s === 'Available' && <div className="absolute bottom-4 text-sm font-black tracking-widest opacity-80 uppercase">{c.cat.split(' ')[0]}</div>}
                    </div>
                );
            };

            if(loading) return <div className="h-screen flex items-center justify-center font-black text-amber-500 text-7xl animate-pulse">DPSG PRO SECURE LOADING...</div>;

            return (
                <div className="max-w-[1800px] mx-auto p-4 py-12">
                    <header className="text-center mb-16">
                        <h1 className="text-8xl md:text-[10rem] font-black italic text-white rajdhani drop-shadow-2xl tracking-tighter">DPSG <span className="text-amber-500">PRO</span></h1>
                        <marquee className="mt-8 bg-amber-500 text-black py-4 font-black text-3xl uppercase rounded-[2rem] shadow-2xl">🔥 51 MEGA PRIZES + ASSURED GIFTS! SELECT YOUR JUMBO LUCKY CARD NOW! 🔥</marquee>
                        
                        <div className="flex flex-wrap gap-8 mt-16 justify-center">
                            {['ALL', 'VIP Card', 'Gold Card', 'Silver Card'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-14 py-7 rounded-[2.5rem] font-black text-4xl uppercase transition-all shadow-xl ${activeTab === t ? 'bg-amber-500 text-black scale-110' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>{t.split(' ')[0]}</button>
                            ))}
                        </div>
                    </header>

                    <div className="card-grid glass">
                        {cards.filter(c => activeTab === 'ALL' || c.cat === activeTab).map(renderCard)}
                    </div>

                    {/* CUSTOMER BOOKING MODAL */}
                    {selected && selected.status === 'Available' && !staff && !localLocks.has(selected.n) && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4 backdrop-blur-3xl">
                            <div className="glass p-16 w-full max-w-5xl border-4 border-amber-500 rounded-[5rem] shadow-[0_0_80px_rgba(251,191,36,0.3)]">
                                <div className="flex justify-between items-center mb-12 border-b-4 border-slate-700 pb-8">
                                    <h3 className="text-7xl font-black text-amber-500 italic uppercase">BOOK: #{selected.n}</h3>
                                    <span className="bg-amber-500 text-black px-8 py-3 rounded-full text-4xl font-black">{selected.cat} | ₹{selected.price}</span>
                                </div>
                                
                                <form onSubmit={bookCard} className="space-y-12">
                                    <input name="Customer_Name" placeholder="Full Name *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-5xl text-white" />
                                    
                                    <div className="grid md:grid-cols-2 gap-12">
                                        <input name="Mobile" type="tel" pattern="[0-9]{10}" placeholder="Mobile Number (10 Digits) *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-4xl text-white" />
                                        <input name="Aadhaar" type="tel" pattern="[0-9]{12}" placeholder="Aadhaar Number (12 Digits) *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-4xl text-white" />
                                    </div>
                                    
                                    <select required value={paymentMode} onChange={(e) => setPaymentMode(e.target.value)} className="w-full bg-slate-900 p-10 rounded-[2rem] font-black border-4 border-slate-700 focus:border-indigo-500 text-4xl text-white outline-none">
                                        <option value="" disabled>Select Payment Mode *</option>
                                        <option value="Cash">Cash / Offline</option>
                                        <option value="PhonePe/GPay">PhonePe / Google Pay</option>
                                        <option value="Airtel Payment Bank">Airtel Payment Bank</option>
                                    </select>
                                    
                                    {paymentMode === 'Airtel Payment Bank' && (
                                        <div className="animate-pulse">
                                            <input name="PAN" placeholder="ENTER PAN CARD NUMBER *" required className="w-full bg-black p-10 rounded-[2rem] font-black border-8 border-red-500 text-5xl uppercase text-white text-center shadow-2xl" />
                                            <p className="text-red-500 text-center mt-4 font-bold text-2xl">PAN is mandatory for Airtel Payment Bank</p>
                                        </div>
                                    )}

                                    <div className="grid md:grid-cols-2 gap-12">
                                        <div>
                                            <label className="text-slate-400 font-bold ml-4 text-xl">Date of Birth (Optional)</label>
                                            <input name="DOB" type="date" className="w-full bg-slate-900 p-8 rounded-[2rem] border-4 border-slate-700 text-4xl text-slate-300 mt-2" />
                                        </div>
                                        <div>
                                            <label className="text-slate-400 font-bold ml-4 text-xl">Village / City (Optional)</label>
                                            <input name="Village" placeholder="Village Name" className="w-full bg-slate-900 p-8 rounded-[2rem] border-4 border-slate-700 text-4xl text-white mt-2" />
                                        </div>
                                    </div>

                                    <div className="flex gap-12 pt-10">
                                        <button type="submit" className="flex-1 bg-gradient-to-r from-amber-500 to-yellow-600 text-black font-black py-12 rounded-[3.5rem] text-6xl uppercase italic shadow-2xl hover:scale-[1.02] transition-transform">CONFIRM BOOKING 🔱</button>
                                        <button type="button" onClick={() => setSelected(null)} className="bg-slate-700 text-white font-black px-20 py-12 rounded-[3.5rem] text-5xl hover:bg-red-600 transition-colors">CANCEL</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* STAFF LOGIN PANEL */}
                    {selected && (selected.status !== 'Available' || localLocks.has(selected.n)) && (
                        <div className="fixed inset-0 z-[70] bg-black/98 flex items-center justify-center p-4 backdrop-blur-3xl overflow-y-auto">
                            <div className="glass p-16 w-full max-w-5xl border-4 border-indigo-500 rounded-[5rem] shadow-[0_0_80px_rgba(99,102,241,0.3)]">
                                <div className="flex justify-between items-center mb-12 border-b-4 border-slate-700 pb-8">
                                    <h3 className="text-6xl font-black text-white">Staff Control: #{selected.n}</h3>
                                    <span className={`px-10 py-4 rounded-full text-4xl font-black uppercase ${selected.status==='Pending' || localLocks.has(selected.n) ?'bg-yellow-500 text-black':'bg-red-600 text-white'}`}>{selected.status === 'Available' ? 'Pending' : selected.status}</span>
                                    <button onClick={() => setSelected(null)} className="text-7xl text-slate-500 hover:text-white">&times;</button>
                                </div>

                                {staff ? (
                                    <div className="space-y-10">
                                        <p className="text-center font-black text-amber-500 text-2xl bg-slate-900 p-4 rounded-2xl border border-amber-500/30">Active Session: {staff.id}</p>
                                        <div className="grid md:grid-cols-2 gap-10 bg-slate-800 p-12 rounded-[3rem] border-4 border-slate-600">
                                            <input id="s_name" defaultValue={selected.d.name} placeholder="Customer Name" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-white border-2 border-slate-700 outline-none" />
                                            <input id="s_mob" defaultValue={selected.d.mob?.replace(/'/g,'')} placeholder="Mobile" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-white border-2 border-slate-700 outline-none" />
                                            <input id="s_aadhaar" defaultValue={selected.d.adhar?.replace(/'/g,'')} placeholder="Aadhaar" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-white border-2 border-slate-700 outline-none" />
                                            <input id="s_pan" defaultValue={selected.d.pan} placeholder="PAN Card" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-white border-2 border-slate-700 outline-none uppercase" />
                                            <select id="s_payMode" defaultValue={selected.d.pay} className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-white border-2 border-slate-700 outline-none">
                                                <option value="Cash">Cash</option><option value="PhonePe/GPay">PhonePe/GPay</option><option value="Airtel Payment Bank">Airtel Payment Bank</option>
                                            </select>
                                            <input id="s_ref" defaultValue={selected.d.ref} placeholder="Txn ID / Ref" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-amber-400 border-2 border-slate-700 outline-none" />
                                            <input id="s_paid" type="number" defaultValue={selected.price} placeholder="Paid Amount ₹" className="w-full bg-green-900/50 p-6 rounded-2xl text-4xl font-black text-green-400 border-4 border-green-500 outline-none" />
                                            <input id="s_img" placeholder="Document / GDrive Link" className="w-full bg-slate-900 p-6 rounded-2xl text-2xl font-bold text-blue-400 border-2 border-slate-700 outline-none" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-10 pt-8 border-t-4 border-slate-700">
                                            <button onClick={() => { handleAction({action:'UPDATE', S_No:selected.n, Status:'Sold', Customer_Name:document.getElementById('s_name').value, Mobile:document.getElementById('s_mob').value, Aadhaar:document.getElementById('s_aadhaar').value, PAN:document.getElementById('s_pan').value, Payment_Mode:document.getElementById('s_payMode').value, Payment_Ref:document.getElementById('s_ref').value, Paid:document.getElementById('s_paid').value, ImgLink:document.getElementById('s_img').value, LogMsg:'VERIFIED AND SOLD'}); setSelected(null); alert("✅ Verified & Sold!"); }} className="bg-red-600 hover:bg-red-500 text-white font-black py-10 rounded-[3rem] text-4xl uppercase shadow-2xl"><i className="fa-solid fa-check-double"></i> Verify & Sold</button>
                                            <button onClick={() => { handleAction({action:'UPDATE', S_No:selected.n, Status:'Available', LogMsg:'REJECTED & CLEARED'}); setLocalLocks(prev => { const n = new Set(prev); n.delete(selected.n); return n; }); setSelected(null); alert("❌ Rejected & Cleared!"); }} className="bg-slate-700 hover:bg-slate-600 text-white font-black py-10 rounded-[3rem] text-4xl uppercase shadow-2xl"><i className="fa-solid fa-trash"></i> Reject (Clear)</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-20">
                                        <i className="fa-solid fa-user-shield text-[10rem] text-slate-600 mb-12"></i>
                                        <h4 className="text-6xl font-black text-white mb-8">This card is {selected.status === 'Available' ? 'Pending' : selected.status}</h4>
                                        <button onClick={() => {
                                            const id = prompt("Staff ID:"); const ps = prompt("Password:");
                                            if(ADMINS[id] === ps) setStaff({id, pass: ps}); else alert("Access Denied! Incorrect Password.");
                                        }} className="bg-indigo-600 text-white font-black px-16 py-10 rounded-[4rem] text-4xl uppercase shadow-2xl hover:bg-indigo-500 transition-colors">Staff Login Here</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SUCCESS WHATSAPP MODAL */}
                    {successModal && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4">
                            <div className="glass p-24 max-w-4xl text-center border-t-[15px] border-green-500 rounded-[5rem] shadow-2xl">
                                <i className="fa-regular fa-circle-check text-[15rem] text-green-500 mb-16 animate-bounce"></i>
                                <h3 className="text-7xl font-black mb-10 text-white">Booking Secured!</h3>
                                <p className="text-slate-300 text-4xl mb-20 font-bold leading-relaxed">Hukum, Card #{successModal.n} is now Pending. Please notify the team via WhatsApp to verify your payment.</p>
                                <a href={`https://wa.me/917229874128?text=Jai Mata Di! Hukum, I have booked DPSG-PRO Card #${successModal.n}. Name: ${successModal.name}. Please verify.`} target="_blank" onClick={()=>setSuccessModal(null)} className="flex items-center justify-center gap-10 w-full bg-[#25D366] text-white font-black py-12 rounded-[4rem] text-6xl shadow-2xl hover:scale-105 transition-transform">
                                    <i className="fa-brands fa-whatsapp text-9xl"></i> Send WhatsApp
                                </a>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
