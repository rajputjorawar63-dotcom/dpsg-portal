        body { font-family: 'Poppins', 'Mukta', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .banner-row { display: flex; overflow-x: auto; gap: 20px; padding: 15px; scroll-snap-type: x mandatory; }
        .banner-row::-webkit-scrollbar { display: none; }
        .banner-3d { min-width: 300px; flex: 1; transition: 0.4s; transform-style: preserve-3d; scroll-snap-align: center; }
        .banner-3d:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; padding: 20px; }
        @media (min-width: 768px) { .card-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 35px; padding: 30px; } }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 30px; font-weight: 900; cursor: pointer; border: 4px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 3rem; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .grid-item:hover { transform: scale(1.08); border-color: #fbbf24; z-index: 10; box-shadow: 0 0 30px rgba(251,191,36,0.4); }
        .card-VIP { background: linear-gradient(135deg, #4f46e5, #1e1b4b); }
        .card-Gold { background: linear-gradient(135deg, #d97706, #451a03); }
        .card-Silver { background: linear-gradient(135deg, #cbd5e1, #475569); color: black; }
        .sold-card { background: linear-gradient(135deg, #7f1d1d, #450a0a) !important; color: #fca5a5 !important; border: 4px solid #450a0a; pointer-events: none; opacity: 0.9; cursor: not-allowed; }
        .pending-card { background: #facc15 !important; color: black !important; border: 6px solid #fff; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.95); } }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        .btn-press:active { transform: scale(0.92) !important; filter: brightness(0.8); }
        .btn-press:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .neon-btn { background: rgba(0,0,0,0.6); border: 2px solid #fbbf24; color: #fbbf24; box-shadow: 0 0 10px #fbbf24, inset 0 0 5px #fbbf24; animation: neonPulse 1.5s infinite alternate; }
        @keyframes neonPulse { from { box-shadow: 0 0 5px #fbbf24; } to { box-shadow: 0 0 20px #fbbf24; } }
        .stock-ticker { background: #7f1d1d; color: white; padding: 10px; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #fbbf24; letter-spacing: 1px;}
    </style>

        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; const MAX_HEIGHT = 400; 
                        let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                        else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); 
                    };
                };
                reader.readAsDataURL(file);
            });
        };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [activeTab, setActiveTab] = useState('ALL'); 
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(() => { try { return JSON.parse(sessionStorage.getItem('dps_session')) || null; } catch(e) { return null; } });
            const [staffAppTab, setStaffAppTab] = useState('DASHBOARD');
            const [successModal, setSuccessModal] = useState(null); 
            const [verifyOutsideModal, setVerifyOutsideModal] = useState(null);
            const [staffSuccessModal, setStaffSuccessModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [localLocks, setLocalLocks] = useState(new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]')));
            const [processingId, setProcessingId] = useState(null); 
            const [discount, setDiscount] = useState(0);
            const [payVerified, setPayVerified] = useState(false);
            const [payMode, setPayMode] = useState("");
            
            const [capturedImg, setCapturedImg] = useState(null);    
            const [enlargedImg, setEnlargedImg] = useState(null);
            const [showLogin, setShowLogin] = useState(false);
            
            const [isCamOpen, setIsCamOpen] = useState(false);
            const [camFacing, setCamFacing] = useState('user'); 

            const openFullScreenCamera = async (facing) => {
                setCamFacing(facing); setIsCamOpen(true); startCamera(facing);
            };

            const startCamera = async (facing) => {
                if(window.localStream) window.localStream.getTracks().forEach(track => track.stop());
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width: {ideal: 1280}, height: {ideal: 720} } });
                    window.localStream = stream; document.getElementById('fullScreenVideo').srcObject = stream;
                } catch(e) { alert("कैमरा एक्सेस नहीं हो पाया!"); setIsCamOpen(false); }
            };

            const captureFullScreenPhoto = () => {
                const video = document.getElementById('fullScreenVideo');
                const canvas = document.createElement('canvas');
                const MAX_W = 400, MAX_H = 400;
                let w = video.videoWidth, h = video.videoHeight;
                if(w > h) { if(w > MAX_W) { h *= MAX_W/w; w = MAX_W; } } else { if(h > MAX_H) { w *= MAX_H/h; h = MAX_H; } }
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, w, h);
                setCapturedImg(canvas.toDataURL('image/jpeg', 0.5)); 
                closeFullScreenCamera();
            };

            const closeFullScreenCamera = () => {
                if(window.localStream) { window.localStream.getTracks().forEach(track => track.stop()); window.localStream = null; }
                setIsCamOpen(false);
            };

            const loadData = async () => {
                try {
                    const res = await fetch(APP_URL + "?action=GET_DATA&_cb=" + new Date().getTime());
                    const rows = await res.json();
                    if(rows && Array.isArray(rows)) {
                        let temp = [];
                        let currentLocks = new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]'));
                        for(let i=1; i<=1000; i++) {
                            let rD = rows.find(r => r[0] && parseInt(r[0]) === i);
                            let s = 'Available';
                            if(rD) {
                               let rawS = (rD[4] || 'Available').toString().trim().toLowerCase();
                               if(rawS.includes("sold") || rawS.includes("success")) { s = "Sold"; currentLocks.delete(i); }
                               else if(rawS.includes("pending")) { s = "Pending"; }
                               else if(rawS.includes("reject") || rawS.includes("available")) { s = "Available"; currentLocks.delete(i); } 
                            } else { currentLocks.delete(i); }
                            temp.push({ 
                                n: i, status: s, cat: i<=100?"VIP Card":i<=600?"Gold Card":"Silver Card",
                                price: rD ? parseInt(rD[16] || (i<=100?500:i<=600?100:50)) : (i<=100?500:i<=600?100:50),
                                mid: (rD && rD[3]) || `DPSG-26-113-${i.toString().padStart(4,'0')}`,
                                token: (rD && rD[25]) || `DPSG-TK-${i.toString().padStart(3,'0')}`,
                                d: { 
                                    name: (rD && rD[6])||"", mob: (rD && rD[7])||"", dob: (rD && rD[8])||"", 
                                    vill: (rD && rD[9])||"", adhar: (rD && rD[10])||"", pan: (rD && rD[11])||"", 
                                    pay: (rD && rD[12])||"", ref: (rD && rD[13])||"", 
                                    dp: (rD && rD[26])||"", discount: (rD && rD[17])||"0" 
                                }
                            });
                        }
                        localStorage.setItem('dps_locks', JSON.stringify([...currentLocks])); setLocalLocks(currentLocks);
                        setCards(temp); setLoading(false);
                    }
                } catch (error) { setLoading(false); }
            };

            useEffect(() => { loadData(); const itvl = setInterval(loadData, 10000); return () => clearInterval(itvl); }, []);

            const handleNativeCapture = async (e) => {
                const file = e.target.files[0];
                if(file) { const b64 = await compressImage(file); setCapturedImg(b64); }
            };

            const bookCard = async (e) => {
                e.preventDefault(); 
                if(!capturedImg) { alert("कृपया अपनी लाइव सेल्फी (DP) ज़रूर लें!"); return; }
                
                setProcessingId("BOOKING"); 
                const fd = new FormData(e.target); 
                const n = selected.n;
                
                const payload = {
                    action: "BOOK", S_No: n.toString(), Category: selected.cat, Base_Price: selected.price,
                    Customer_Name: fd.get("Customer_Name"), Mobile: fd.get("Mobile"), DOB: fd.get("DOB") || "", 
                    Village: fd.get("Village") || "", Aadhaar: fd.get("Aadhaar"), PAN: fd.get("PAN") || "",
                    Payment_Mode: fd.get("Payment_Mode"), Payment_Ref: fd.get("Payment_Ref") || "",
                    selfie: capturedImg || ""
                };

                const urlParams = new URLSearchParams();
                for (let k in payload) urlParams.append(k, payload[k]);

                try { 
                    await fetch(APP_URL, { method: 'POST', body: urlParams }); 
                } catch(err){}
                
                setLocalLocks(prev => { const ns = new Set(prev).add(n); localStorage.setItem('dps_locks', JSON.stringify([...ns])); return ns; });
                setSuccessModal({
                    n, cat: selected.cat, name: fd.get("Customer_Name"), mid: selected.mid, mob: fd.get("Mobile"),
                    dob: fd.get("DOB"), adhar: fd.get("Aadhaar"), pay: fd.get("Payment_Mode"), pan: fd.get("PAN") || "N/A",
                    vill: fd.get("Village") || "N/A", ref: fd.get("Payment_Ref") || "N/A", token: `DPSG-TK-${n.toString().padStart(3,'0')}`
                });
                closeModalAndReset(); setProcessingId(null); setTimeout(loadData, 1500);
            };

            const masterUpdate = async (c, status, isInsideForm = false) => {
                setProcessingId(isInsideForm ? "UPLOADING_STAFF" : c.n);
                setCards(prev => prev.map(card => card.n === c.n ? { ...card, status: status === 'Sold' ? 'Sold' : 'Available' } : card));
                if(status === 'Available' || status === 'Rejected') { 
                    setLocalLocks(p => { const ns = new Set(p); ns.delete(c.n); localStorage.setItem('dps_locks', JSON.stringify([...ns])); return ns; }); 
                }

                let sName = c.d.name, sMob = c.d.mob, sAdhar = c.d.adhar, sPan = c.d.pan;
                let sPay = c.d.pay, sRef = c.d.ref, sPaid = c.price, finalDisc = 0, sDob = c.d.dob, sVill = c.d.vill;
                
                if(isInsideForm) {
                    sName = document.getElementById('s_name').value; sMob = document.getElementById('s_mob').value;
                    sAdhar = document.getElementById('s_adhar').value; sPan = document.getElementById('s_pan').value;
                    sPay = document.getElementById('s_pay').value; sRef = document.getElementById('s_ref').value;
                    sDob = document.getElementById('s_dob').value; sVill = document.getElementById('s_vill').value;
                    sPaid = document.getElementById('s_paid').value; finalDisc = discount;
                }

                if(isInsideForm) setProcessingId(c.n);

                const payload = {
                    action: "UPDATE", S_No: c.n.toString(), Category: c.cat, Status: status, staffID: staff.id,
                    Customer_Name: sName, Mobile: sMob, DOB: sDob, Village: sVill, Aadhaar: sAdhar, PAN: sPan,
                    Payment_Mode: sPay, Payment_Ref: sRef, Paid: sPaid, Discount: finalDisc, Changes_Made: "Data Verified",
                    selfie: capturedImg || ""
                };

                const urlParams = new URLSearchParams();
                for (let k in payload) urlParams.append(k, payload[k]);

                try { await fetch(APP_URL, { method: 'POST', body: urlParams }); } catch(error) {}
                
                setProcessingId(null); closeModalAndReset(); setVerifyOutsideModal(null); setPayVerified(false);
                if(status === 'Sold') setStaffSuccessModal({...c, finalPaid: sPaid, finalName: sName, finalMob: sMob, finalPan: sPan, finalAdhar: sAdhar, finalVill: sVill, finalDob: sDob, finalDisc, finalPayMode: sPay, changesStr: "Verified"});
                else setStaffSuccessModal({...c, isReject: true, finalName: sName, finalMob: sMob}); 
                setTimeout(loadData, 1500);
            };

            const closeModalAndReset = () => { setSelected(null); setCapturedImg(null); setDiscount(0); };
            const handleOutsideVerify = (c) => { setPayVerified(false); setVerifyOutsideModal(c); };

            const renderCard = (c) => {
                const isLocked = localLocks.has(c.n) || c.status === 'Pending';
                let s = c.status === 'Sold' ? 'Sold' : isLocked ? 'Pending' : 'Available';
                if(c.status === 'Processing_Hide' || c.status === 'Rejected') return null;
                const color = s === 'Sold' ? 'sold-card' : s === 'Pending' ? 'pending-card' : `card-${c.cat.split(' ')[0]}`;
                
                return (
                    <div key={c.n} onClick={() => {
                        if (s === 'Sold') return;
                        if (!staff && s === 'Pending') { alert("यह कार्ड पहले ही बुक / पेंडिंग है।"); return; }
                        setSelected(c);
                    }} className={`grid-item ${color}`}>

                                        <div><label className="text-xs font-bold text-green-400 ml-1"><i className="fa-solid fa-hashtag"></i> Txn ID (रेफरेंस) *</label><input name="Payment_Ref" required placeholder="UTR Number / Payment ID" className="w-full bg-black p-3 rounded-xl font-black border border-green-500 text-green-400 text-base focus:border-amber-500 outline-none shadow-inner" /></div>
                                    </div>
                                    
                                    <button type="submit" disabled={processingId === "BOOKING" || !capturedImg} className="w-full bg-gradient-to-r from-amber-500 to-yellow-400 text-black font-black py-4 rounded-xl text-xl md:text-2xl uppercase italic shadow-lg mt-2 disabled:opacity-50 btn-press flex items-center justify-center gap-2">
                                        {processingId === "BOOKING" ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane"></i>} {processingId === "BOOKING" ? "UPLOADING SECURELY... ⏳" : "CONFIRM BOOKING 🔱"}
                                    </button>
                                    {!capturedImg && <p className="text-red-500 text-center font-bold text-[10px] mt-1">बुकिंग के लिए लाइव सेल्फी (DP) खींचना या अपलोड करना अनिवार्य है।</p>}
                                </div>
                            </form>
                        </div>
                    )}

                    {successModal && (
                        <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4">
                            <div className="glass p-8 max-w-md w-full text-center border-t-8 border-green-500 rounded-3xl shadow-2xl">
                                <i className="fa-regular fa-circle-check text-7xl text-green-500 mb-4 animate-bounce"></i>
                                <h3 className="text-3xl font-black mb-2 text-white uppercase">बुकिंग सफल!</h3>
                                <div className="bg-green-600/20 p-3 rounded-xl border border-green-500 mb-6 font-black text-xl text-green-400">TOKEN: {successModal.token}</div>
                                <button onClick={()=>setSuccessModal(null)} className="bg-green-600 text-white px-8 py-3 rounded-full font-black hover:bg-green-500 transition-colors shadow-lg">✖ OK</button>
                            </div>
                        </div>
                    )}

                    {enlargedImg && (
                        <div className="fixed inset-0 z-[500] bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl" onClick={() => setEnlargedImg(null)}>
                            <button onClick={() => setEnlargedImg(null)} className="absolute top-5 right-5 text-white text-5xl font-black hover:text-red-500 transition-colors">&times;</button>
                            <img src={enlargedImg} className="max-w-full max-h-[90vh] rounded-2xl border-4 border-amber-500 shadow-[0_0_50px_rgba(251,191,36,0.5)] object-contain" />
                        </div>
                    )}

                    {!staff && (
                        <div className="mt-20 mb-10 text-center">
                            <button onClick={()=>{let u=prompt("Staff ID:");let p=prompt("Pass:");if(ADMINS[u]===p){const sess={id:u,pass:p};localStorage.setItem('dps_session',JSON.stringify(sess));setStaff(sess);}else alert("Access Denied");}} className="text-slate-500 hover:text-indigo-400 font-black tracking-widest text-sm uppercase transition-colors">🔱 STAFF CONTROL CENTER 🔱</button>
                        </div>
                    )}

                    {isCamOpen && (
                        <div className="fixed inset-0 z-[99999] bg-black flex flex-col justify-center items-center">
                            <video id="fullScreenVideo" autoPlay playsInline className="absolute inset-0 w-full h-full object-cover bg-black"></video>
                            <div className="absolute top-0 w-full p-4 flex justify-between z-10">
                                <button type="button" onClick={closeFullScreenCamera} className="bg-red-600 text-white px-5 py-2 rounded-xl font-black"><i className="fa-solid fa-arrow-left"></i> BACK</button>
                            </div>
                            <div className="absolute bottom-0 w-full p-8 flex justify-center z-10 pb-16">
                                <button type="button" onClick={captureFullScreenPhoto} className="bg-green-500 text-black px-10 py-5 rounded-full text-2xl font-black border-4 border-white"><i className="fa-solid fa-camera"></i> CAPTURE DP</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
