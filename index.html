        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600; 
                        const MAX_HEIGHT = 600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        } else {
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                        }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.5)); // 50% Quality - Very Light Size
                    };
                };
                reader.readAsDataURL(file);
            });
        };

                        <div className="lg:col-span-8 glass p-4 md:p-8 h-[800px] flex flex-col border-t-[8px] border-indigo-500">

                    {showSalesBoard && (

                            <div className="glass p-6 md:p-10 w-full max-w-4xl border border-amber-500 rounded-3xl bg-[#0a0a0a] shadow-[0_0_50px_rgba(251,191,36,0.2)] relative max-h-[90vh] flex flex-col">

                                <h3 className="text-3xl md:text-4xl font-black text-amber-500 mb-6 text-center italic tracking-widest uppercase border-b border-slate-800 pb-4"><i className="fa-solid fa-trophy text-yellow-400"></i> DPSG लाइव बिक्री बोर्ड</h3>
                                <div className="overflow-y-auto flex-1 custom-scroll bg-black/50 rounded-xl p-2 md:p-4 border border-slate-800">
                                    <table className="w-full text-left text-sm md:text-base border-collapse">
                                        <thead className="sticky top-0 bg-black/90 backdrop-blur-sm z-10 border-b-2 border-amber-500">
                                            <tr className="text-amber-500"><th className="p-3">S.No</th><th className="p-3">Member ID</th><th className="p-3">Customer Name</th></tr>
                                        </thead>
                                        <tbody>
                                            {soldListData.length === 0 ? <tr><td colSpan="3" className="text-center py-10 font-bold text-slate-500 italic">लोड हो रहा है...</td></tr> : 
                                            soldListData.map((r, i) => (

                                                    <td className="p-3 font-bold text-indigo-400">{r.ID}</td>
                                                    <td className="p-3 font-black text-green-400 uppercase">{r.Name}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <button onClick={()=>setShowSalesBoard(false)} className="mt-6 w-full bg-slate-800 hover:bg-slate-700 text-white py-3 rounded-xl font-black btn-press border border-slate-600">बंद करें (CLOSE)</button>
                            </div>
                        </div>
                    )}

                    {/* CUSTOMER BOOKING MODAL (1 CLICK UPLOAD - NO INDIVIDUAL UPLOAD BUTTONS) */}
                    {selected && !staff && (
                        <div key={selected.n} className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
                            <form onSubmit={bookCard} className="glass p-6 md:p-10 w-full max-w-3xl border border-amber-500 rounded-3xl shadow-2xl relative mt-20 md:mt-0 bg-[#0a0a0a]">
                                <button type="button" onClick={closeModalAndReset} className="absolute top-4 right-6 text-4xl text-slate-400 hover:text-white btn-press">&times;</button>

                                    {/* 📦 1. NATIVE SELFIE CAMERA 📦 */}
                                    <div className="bg-black/50 p-6 rounded-2xl border-2 border-dashed border-amber-500 text-center">
                                        <h4 className="text-amber-400 font-black mb-4"><i className="fa-solid fa-user-circle"></i> 1. लाइव सेल्फी (Face Photo) *</h4>
                                        {capturedImg ? (
                                            <div>
                                                <img src={capturedImg} className="mx-auto rounded-full w-[150px] h-[150px] border-4 border-amber-500 object-cover shadow-lg" />
                                                <div className="flex justify-center gap-3 mt-4">
                                                    <button type="button" onClick={()=>setEnlargedImg(capturedImg)} className="bg-blue-600 px-4 py-2 rounded-lg font-bold text-white shadow-md btn-press"><i className="fa-solid fa-eye"></i> View</button>
                                                    <label className="bg-red-600 px-4 py-2 rounded-lg font-bold text-white shadow-md cursor-pointer btn-press"><i className="fa-solid fa-camera"></i> Retake<input type="file" accept="image/*" capture="user" hidden onChange={(e)=>handleNativeCapture(e, setCapturedImg)} /></label>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex justify-center gap-3">
                                                <label className="bg-amber-500 hover:bg-amber-400 px-6 py-4 rounded-2xl font-black text-black shadow-[0_0_20px_rgba(251,191,36,0.4)] cursor-pointer flex-1 text-lg btn-press transition-transform">

                                                    <input type="file" accept="image/*" capture="user" hidden onChange={(e)=>handleNativeCapture(e, setCapturedImg)} />
                                                </label>

                                                    <i className="fa-solid fa-images text-xl mb-1 block"></i> Gallery
                                                    <input type="file" accept="image/*" hidden onChange={(e)=>handleNativeCapture(e, setCapturedImg)} />
                                                </label>
                                            </div>
                                        )}
                                    </div>

                                    {/* 📦 2. NATIVE AADHAAR FRONT 📦 */}
                                    <div className="bg-black/40 p-5 rounded-xl border border-dashed border-indigo-500 text-center">
                                        <h4 className="text-indigo-400 font-black mb-3 text-sm"><i className="fa-regular fa-id-card"></i> 2. आधार कार्ड (Front)</h4>
                                        {aFrontImg ? (
                                            <div>
                                                <img src={aFrontImg} className="mx-auto rounded-lg w-full max-w-[250px] border-2 border-indigo-500 shadow-md" />
                                                <div className="flex justify-center gap-2 mt-3">
                                                    <button type="button" onClick={()=>setEnlargedImg(aFrontImg)} className="bg-blue-600 px-4 py-1.5 rounded-lg text-xs font-bold text-white btn-press"><i className="fa-solid fa-eye"></i> View</button>

                                            </div>

                                            <div className="flex justify-center gap-3">
                                                <label className="bg-indigo-600 px-4 py-3 rounded-xl text-sm font-bold text-white shadow-lg cursor-pointer flex-1 btn-press">
                                                    <i className="fa-solid fa-camera mb-1 block text-lg"></i> Scan Front
                                                    <input type="file" accept="image/*" capture="environment" hidden onChange={(e)=>handleNativeCapture(e, setAFrontImg)} />
                                                </label>

                                                    <i className="fa-solid fa-upload mb-1 block text-lg"></i> Upload

                                    {/* 📦 3. NATIVE AADHAAR BACK 📦 */}

                                                    <label className="bg-slate-700 px-4 py-1.5 rounded-lg text-xs font-bold text-white cursor-pointer btn-press">Retake<input type="file" accept="image/*" capture="environment" hidden onChange={(e)=>handleNativeCapture(e, setABackImg)} /></label>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex justify-center gap-3">

                                                    <i className="fa-solid fa-camera mb-1 block text-lg"></i> Scan Back
                                                    <input type="file" accept="image/*" capture="environment" hidden onChange={(e)=>handleNativeCapture(e, setABackImg)} />
                                                </label>
                                                <label className="bg-slate-700 px-4 py-3 rounded-xl text-sm font-bold text-white shadow-lg cursor-pointer flex-1 btn-press">
                                                    <i className="fa-solid fa-upload mb-1 block text-lg"></i> Upload
                                                    <input type="file" accept="image/*" hidden onChange={(e)=>handleNativeCapture(e, setABackImg)} />
                                                </label>
                                            </div>
                                        )}
                                    </div>

                                    {/* 📦 4. NATIVE PAN CARD 📦 */}
                                    <div className="bg-black/40 p-5 rounded-xl border border-dashed border-red-500 text-center">
                                        <h4 className="text-red-400 font-black mb-3 text-sm"><i className="fa-solid fa-credit-card"></i> 4. पैन कार्ड (PAN Card)</h4>

                                                <img src={panImg} className="mx-auto rounded-lg w-full max-w-[250px] border-2 border-red-500 shadow-md" />

                                                </div>
                                            </div>

                                            <div className="flex justify-center gap-3">
                                                <label className="bg-red-600 px-4 py-3 rounded-xl text-sm font-bold text-white shadow-lg cursor-pointer flex-1 btn-press">
                                                    <i className="fa-solid fa-camera mb-1 block text-lg"></i> Scan PAN
                                                    <input type="file" accept="image/*" capture="environment" hidden onChange={(e)=>handleNativeCapture(e, setPanImg)} />
                                                </label>
                                                <label className="bg-slate-700 px-4 py-3 rounded-xl text-sm font-bold text-white shadow-lg cursor-pointer flex-1 btn-press">
                                                    <i className="fa-solid fa-upload mb-1 block text-lg"></i> Upload
                                                    <input type="file" accept="image/*" hidden onChange={(e)=>handleNativeCapture(e, setPanImg)} />
                                                </label>
                                            </div>
                                        )}
                                    </div>

                                    {/* FORM DETAILS */}
                                    <div><label className="text-xs font-bold text-slate-400 ml-1">पूरा नाम (Full Name) *</label><input name="Customer_Name" required className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none" /></div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-400 ml-1">मोबाइल (Mobile) *</label><input name="Mobile" type="tel" pattern="[0-9]{10}" required className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none" /></div>
                                        <div><label className="text-xs font-bold text-slate-400 ml-1">जन्मतिथि (DOB) *</label><input name="DOB" type="date" required className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none" /></div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-400 ml-1">आधार (Aadhaar) *</label><input name="Aadhaar" type="tel" pattern="[0-9]{12}" required className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none" /></div>
                                        <div><label className="text-xs font-bold text-slate-400 ml-1">गाँव / शहर (Village/City)</label><input name="Village" className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none" /></div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-slate-400 ml-1">पेमेंट मोड (Payment Mode) *</label><select name="Payment_Mode" required onChange={(e)=>setPayMode(e.target.value)} className="w-full bg-slate-900 p-3 rounded-xl font-bold border border-slate-700 text-white text-base focus:border-amber-500 outline-none"><option value="" disabled>चुनें (Select)</option><option value="Cash">नकद (Cash)</option><option value="PhonePe/GPay">UPI / App</option><option value="Airtel Payment Bank">Airtel Payment Bank</option></select></div>
                                        {payMode === 'Airtel Payment Bank' && <div><label className="text-xs font-black text-red-500 ml-1">PAN CARD *</label><input name="PAN" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" placeholder="ABCDE1234F" className="w-full bg-black p-3 rounded-xl font-black border-2 border-red-600 text-white text-base uppercase shadow-inner" /></div>}
                                    </div>
                                    
                                    <div className="grid md:grid-cols-1 gap-4">
                                        <div><label className="text-xs font-bold text-green-400 ml-1"><i className="fa-solid fa-hashtag"></i> Txn ID (रेफरेंस) *</label><input name="Payment_Ref" required placeholder="UTR Number / Payment ID" className="w-full bg-black p-3 rounded-xl font-black border border-green-500 text-green-400 text-base focus:border-amber-500 outline-none shadow-inner" /></div>
                                    </div>
                                    
                                    <button type="submit" disabled={processingId === "BOOKING" || !capturedImg} className="w-full bg-gradient-to-r from-amber-500 to-yellow-400 text-black font-black py-4 rounded-xl text-xl md:text-2xl uppercase italic shadow-lg mt-2 disabled:opacity-50 btn-press flex items-center justify-center gap-2">
                                        {processingId === "BOOKING" ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane"></i>} {processingId === "BOOKING" ? "UPLOADING SECURELY... ⏳" : "CONFIRM BOOKING 🔱"}
                                    </button>
                                    {!capturedImg && <p className="text-red-500 text-center font-bold text-[10px] mt-1">बुकिंग के लिए लाइव सेल्फी खींचना अनिवार्य है।</p>}
                                </div>
                            </form>
                        </div>
                    )}

                    {successModal && (
                        <div className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center p-4">
                            <div className="glass p-8 max-w-md w-full text-center border-t-8 border-green-500 rounded-3xl shadow-2xl">
                                <i className="fa-regular fa-circle-check text-7xl text-green-500 mb-4 animate-bounce"></i>
                                <h3 className="text-3xl font-black mb-2 text-white uppercase">बुकिंग सफल!</h3>
                                <div className="bg-green-600/20 p-3 rounded-xl border border-green-500 mb-6 font-black text-xl text-green-400">TOKEN: {successModal.token}</div>
                                
                                <div className="space-y-3">
                                    <a href={`whatsapp://send?phone=917229874128&text=${encodeURIComponent(`🔱 *DIGITAL PROBLEM SOLUTION GROUP (DPSG)* 🔱\n_"समस्या आपकी समाधान हमारा, उचित मूल्य बेहतरीन सेवा"_\n━━━━━━━━━━━━━━━━━━━━━━\n🙏 *जय माता दी! हुकुम जोरावर बना* 🚩\n\nसंस्था के पोर्टल पर एक नया आवेदन (Booking) सफलतापूर्वक दर्ज किया गया है। कृपया निम्नलिखित विवरण की समीक्षा करें:\n\n📋 *आवेदक का संपूर्ण विवरण:*\n• *टोकन संख्या:* ${successModal.token}\n• *कार्ड क्रमांक:* #${successModal.n} (${successModal.cat})\n• *आवेदक का नाम:* ${successModal.name}\n• *जन्मतिथि (DOB):* ${successModal.dob || 'N/A'}\n• *पंजीकृत मोबाइल:* ${successModal.mob}\n• *आधार नंबर:* ${successModal.adhar}\n• *निवास स्थान (पता):* ${successModal.vill}\n${successModal.pan && successModal.pan !== "N/A" ? `• *पैन कार्ड संख्या:* ${successModal.pan}\n` : ""}💳 *भुगतान का विवरण:*\n• *भुगतान का माध्यम:* ${successModal.pay}\n• *ट्रांजेक्शन आईडी:* ${successModal.ref} \n━━━━━━━━━━━━━━━━━━━━━━\n📞 *हेल्पलाइन:* +91 7229874128\n🌐 *DPSG ऑटोमेटेड सिस्टम*`)}`} onClick={()=>setSuccessModal(null)} className="flex items-center justify-center gap-3 w-full bg-[#25D366] hover:bg-[#20b858] text-white font-black py-3 rounded-xl text-lg shadow-lg btn-press">
                                        <i className="fa-solid fa-user-tie text-2xl"></i> 1. SEND REPORT TO OWNER
                                    </a>
                                    
                                    <button onClick={()=>sendToGroupCopy(`🔱 *DPSG NEW BOOKING (GROUP ALERT)* 🔱\n_"समस्या आपकी समाधान हमारा, उचित मूल्य बेहतरीन सेवा"_\n━━━━━━━━━━━━━━━━━━━━━━\n📋 *आवेदक का संपूर्ण विवरण:*\n• *टोकन संख्या:* ${successModal.token}\n• *कार्ड क्रमांक:* #${successModal.n} (${successModal.cat})\n• *आवेदक का नाम:* ${successModal.name}\n• *जन्मतिथि (DOB):* ${successModal.dob || 'N/A'}\n• *पंजीकृत मोबाइल:* ${successModal.mob}\n• *आधार नंबर:* ${successModal.adhar}\n• *निवास स्थान:* ${successModal.vill}\n${successModal.pan && successModal.pan !== "N/A" ? `• *पैन कार्ड:* ${successModal.pan}\n` : ""}💳 *भुगतान का विवरण:*\n• *भुगतान का माध्यम:* ${successModal.pay}\n• *Txn ID:* ${successModal.ref}\n━━━━━━━━━━━━━━━━━━━━━━`)} className="flex items-center justify-center gap-3 w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-3 rounded-xl text-lg shadow-lg btn-press">
                                        <i className="fa-solid fa-users text-2xl"></i> 2. SEND TO WHATSAPP GROUP
                                    </button>
                                </div>

                                <button onClick={()=>setSuccessModal(null)} className="mt-6 text-slate-500 font-bold underline">Close Window</button>
                            </div>
                        </div>
                    )}

                    {enlargedImg && (
                        <div className="fixed inset-0 z-[500] bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl" onClick={() => setEnlargedImg(null)}>
                            <button onClick={() => setEnlargedImg(null)} className="absolute top-5 right-5 text-white text-5xl font-black hover:text-red-500 transition-colors">&times;</button>
                            <img src={enlargedImg} className="max-w-full max-h-[90vh] rounded-2xl border-4 border-amber-500 shadow-[0_0_50px_rgba(251,191,36,0.5)] object-contain" />
                        </div>
                    )}

                    {!staff && (
                        <div className="mt-20 mb-10 text-center">
                            {showLogin ? (
                                <div className="glass p-6 max-w-sm mx-auto rounded-3xl border border-indigo-500 bg-[#0a0a0a] shadow-xl">
                                    <h4 className="text-2xl font-black text-indigo-400 mb-6 tracking-widest uppercase">
                                        {otpStep ? "सुरक्षा जांच (OTP)" : "STAFF LOGIN"}
                                    </h4>
                                    
                                    {!otpStep ? (
                                        <>
                                            <input id="l_id" placeholder="Staff ID (e.g. Jorawar@DPS)" className="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 mb-4 text-white text-center font-bold focus:border-indigo-500 outline-none" />
                                            <input id="l_pass" type="password" placeholder="Password" className="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6 text-white text-center font-bold focus:border-indigo-500 outline-none" />
                                            <button onClick={handleLoginAttempt} disabled={processingId === "OTP_SENDING"} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 rounded-xl btn-press text-lg shadow-lg flex items-center justify-center gap-2">
                                                {processingId === "OTP_SENDING" ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-shield-halved"></i>} 
                                                {processingId === "OTP_SENDING" ? "Verifying..." : "LOGIN SECURELY"}
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <p className="text-xs text-slate-400 mb-4 font-bold">ओनर की ईमेल पर 6 अंकों का सुरक्षा कोड भेजा गया है।</p>
                                            <input value={otpValue} onChange={(e)=>setOtpValue(e.target.value)} placeholder="6 Digit OTP" maxLength="6" className="w-full bg-black p-4 rounded-xl border-2 border-green-500 mb-6 text-green-400 text-center font-black tracking-[0.5em] text-2xl outline-none" />
                                            <button onClick={handleOtpVerify} className="w-full bg-green-600 hover:bg-green-500 text-white font-black py-4 rounded-xl btn-press text-lg shadow-lg">
                                                <i className="fa-solid fa-check-double"></i> VERIFY OTP & ENTER
                                            </button>
                                        </>
                                    )}

                                    <button onClick={()=>{setShowLogin(false); setOtpStep(false);}} className="mt-6 text-slate-500 hover:text-white text-sm font-bold underline transition-colors">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={()=>setShowLogin(true)} className="text-slate-500 hover:text-amber-400 font-black tracking-widest text-sm uppercase transition-colors"><i className="fa-solid fa-lock"></i> 🔱 STAFF CONTROL CENTER 🔱</button>
                            )}
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
