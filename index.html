<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG - Digital Problem Solution Group 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Rajdhani:wght@700&family=Mukta:wght@400;800&display=swap');
        body { font-family: 'Poppins', 'Mukta', sans-serif; background: #010409; color: white; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 4rem; }
        
        /* 💎 3D BANNERS IN SINGLE LINE 💎 */
        .banner-row { display: flex; overflow-x: auto; gap: 40px; padding: 30px; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .banner-row::-webkit-scrollbar { display: none; }
        .banner-3d { min-width: 350px; flex: 1; transition: 0.6s; transform-style: preserve-3d; scroll-snap-align: center; }
        .banner-3d:hover { transform: translateY(-20px) rotateY(10deg); box-shadow: 0 50px 100px rgba(0,0,0,0.9); }

        /* 🎴 JUMBO CARDS - NO STICKING 🎴 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 60px; padding: 60px; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 60px; font-weight: 900; cursor: pointer; border: 8px solid rgba(255,255,255,0.1); transition: 0.4s; font-size: 110px; position: relative; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .grid-item:hover { transform: scale(1.15); border-color: #fbbf24; z-index: 20; box-shadow: 0 0 80px rgba(251,191,36,0.6); }
        
        .card-VIP { background: linear-gradient(135deg, #4f46e5, #1e1b4b); }
        .card-Gold { background: linear-gradient(135deg, #d97706, #451a03); }
        .card-Silver { background: linear-gradient(135deg, #cbd5e1, #475569); color: black; }
        .pending-card { background: #facc15 !important; color: black !important; border: 15px solid #fff; animation: pulse 1.5s infinite; }
        .sold-card { background: #ef4444 !important; opacity: 0.4; pointer-events: none; border: 12px solid #7f1d1d; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.9); } }
        
        /* 🎁 PRIZE GLOW EFFECT (लपक-झपक) 🎁 */
        .prize-glow { border: 4px solid #fbbf24; animation: flash-glow 1.5s infinite; }
        @keyframes flash-glow { 0%, 100% { box-shadow: 0 0 10px #fbbf24; background: rgba(30, 41, 59, 0.8); } 50% { box-shadow: 0 0 40px #fbbf24; background: rgba(251, 191, 36, 0.2); } }
        
        .custom-scroll::-webkit-scrollbar { width: 14px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const APP_URL = "https://script.google.com/macros/s/AKfycbwOQfdebHIIv6ud5M6arLov7a5MTnurlBaB-sGvrKOkspn2FC4ouoK_yDRpVpEqhjlAFw/exec";
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11UVWUzSUwI2mm9tsBMaNARgUnfwIZ5TKDaHsKb4Cl58/export?format=csv";
        const COMPANY = "Digital Problem Solution Group";
        const SLOGAN = "आपकी समस्या हमारा समाधान, उचित मूल्य बेहतरीन सेवा";
        const ADMINS = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020" };

        const PRIZES = [
            {r:1, n:"₹5000 Cash 💰", m1:"किस्मत चमकेगी और जेब भरेगी सीधा ₹5000 कैश के साथ।", m2:"DPSG का पहला इनाम, जो बनाएगा आपकी दिवाली खास।"},
            {r:2, n:"LED TV 📺", m1:"घर बनेगा सिनेमा हॉल, जब आप जीतेंगे शानदार LED TV।", m2:"बेहतरीन पिक्चर क्वालिटी और मनोरंजन का नया अनुभव।"},
            {r:3, n:"Kids Bicycle 🚲", m1:"बच्चों के चेहरे पर लाएं मुस्कान, जीतें उनके सपनों की साइकिल।", m2:"सेहत और मस्ती का डबल डोज़, बच्चों के लिए बेस्ट गिफ्ट।"},
            {r:4, n:"Ceiling Fan 🌀", m1:"गर्मी को कहें बाय-बाय, जब घर में आए ब्रांडेड छत का पंखा।", m2:"ठंडी हवा और सुकून भरी नींद, DPSG का शानदार उपहार।"},
            {r:5, n:"Bati Oven 🍳", m1:"अब घर पर बनाएं राजस्थानी स्वाद, जीतें प्रीमियम बाटी ओवन।", m2:"रसोई की शान बढ़ाएं और स्वादिष्ट खाने का आनंद लें।"},
            {r:6, n:"Keypad Mobile 📱", m1:"अपनों से जुड़े रहने का मौका, जीतें एक टिकाऊ कीपैड मोबाइल।", m2:"मजबूत बैटरी और साफ़ आवाज़, हर उम्र के लिए बेहतरीन।"},
            {r:7, n:"Smart Watch ⌚", m1:"अपनी सेहत और समय पर रखें नज़र, स्टाइल वाली स्मार्ट वॉच के साथ।", m2:"लुक में कूल और फीचर्स में धांसू, आज ही अपना कार्ड बुक करें।"},
            {r:8, n:"Power Bank 🔋", m1:"अब मोबाइल की बैटरी कभी नहीं होगी खत्म, साथ रखें ये पावर बैंक।", m2:"सफर में हो या घर पर, चार्जिंग की टेंशन अब हुई पुरानी।"},
            {r:9, n:"Sports Shoes 👟", m1:"फिटनेस की ओर बढ़ाएं कदम, पहनें स्टाइलिश स्पोर्ट्स शूज।", m2:"मजबूती ऐसी कि हर कदम पर मिले कॉन्फिडेंस और आराम।"},
            {r:10, n:"Riding Helmet 🪖", m1:"आपकी सुरक्षा हमारी प्राथमिकता, जीतें ISI मार्क हेलमेट।", m2:"स्टाइल भी और सुरक्षा भी, सुरक्षित सफर का वादा।"}
        ];
        
        const otherPrizes = ["Remote Car", "Roti Box", "Bedsheet", "Neckband", "Earbuds", "Trimmer", "Watch", "Cash ₹301", "Cash ₹201", "Wall Clock", "Tea Set", "Movie Ticket", "Umbrella", "Sunglasses", "Tool Set", "LED Bulb", "Perfume", "Speaker", "Lunch Box", "Belt", "Purse", "Hair Dryer", "Iron Box"];
        otherPrizes.forEach((p, i) => PRIZES.push({r:i+11, n:p + " 🎁", m1:"DPSG का धमाकेदार उपहार!", m2:"किस्मत आजमाएं और आज ही अपना कार्ड बुक करें।"}));

        const App = () => {
            const [cards, setCards] = useState([]);
            const [activeTab, setActiveTab] = useState('ALL'); 
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(null);
            const [successModal, setSuccessModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [localLocks, setLocalLocks] = useState(new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]')));

            const loadData = () => {
                fetch(CSV_URL + "?t=" + Date.now()).then(r => r.text()).then(csv => {
                    const rows = csv.split('\n').map(r => r.split(','));
                    let temp = [];
                    for(let i=1; i<=1000; i++) {
                        let rD = rows.find(r => r[0] == i) || [];
                        let s = rD[4]?.trim() || 'Available';
                        if(s === "सॉल्ड") s = "Sold"; if(s === "पेंडिंग") s = "Pending";
                        let cat = i <= 100 ? "VIP Card" : i <= 600 ? "Gold Card" : "Silver Card";
                        temp.push({ 
                            n: i, status: s, cat, price: rD[16] || (i<=100?500:i<=600?100:50),
                            mid: rD[3] || `DPSG-26-113-${i.toString().padStart(4,'0')}`,
                            d: { name: rD[6], mob: rD[7], vill: rD[9], adhar: rD[10], pan: rD[11], pay: rD[12], ref: rD[13], dob: rD[8] } 
                        });
                    }
                    setCards(temp); setLoading(false);
                });
            };

            useEffect(() => { loadData(); setInterval(loadData, 10000); }, []);

            const bookCard = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const n = selected.n;
                const newLocks = new Set(localLocks).add(n);
                setLocalLocks(newLocks);
                localStorage.setItem('dps_locks', JSON.stringify([...newLocks]));
                const params = new URLSearchParams(Object.fromEntries(fd));
                params.append("action", "BOOK"); params.append("S_No", n.toString()); 
                params.append("Category", selected.cat); params.append("Base_Price", selected.price);
                await fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                setSuccessModal({ n, name: fd.get("Customer_Name"), mid: selected.mid });
                setSelected(null);
            };

            const staffUpdate = (status) => {
                const params = new URLSearchParams({
                    action: 'UPDATE', S_No: selected.n, Status: status, staffID: staff.id, staffPass: staff.pass,
                    Customer_Name: document.getElementById('s_name').value, Mobile: document.getElementById('s_mob').value,
                    Aadhaar: document.getElementById('s_adhar').value, PAN: document.getElementById('s_pan').value,
                    Payment_Mode: document.getElementById('s_pay').value, Payment_Ref: document.getElementById('s_ref').value,
                    Paid: document.getElementById('s_paid').value, LogMsg: `Verified as ${status} by ${staff.id}`
                });
                fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                if(status === 'Available') setLocalLocks(prev => { const n = new Set(prev); n.delete(selected.n); return n; });
                setSelected(null); alert("Data Synchronized Successfully!");
            };

            if(loading) return <div className="h-screen flex items-center justify-center font-black text-amber-500 text-[12rem] animate-pulse italic">DPSG</div>;

            return (
                <div className="max-w-[1950px] mx-auto p-4 py-20">
                    <header className="text-center mb-32">
                        <h1 className="text-[12rem] font-black italic text-white rajdhani tracking-tighter drop-shadow-2xl leading-none">{COMPANY}</h1>
                        <p className="text-amber-500 text-5xl font-bold uppercase tracking-[0.4em] mt-10 italic">{SLOGAN}</p>
                        
                        <div className="banner-row mt-24">
                            {[
                                {t:'VIP CARD', p:'500', c:'card-VIP', d:'पूरे परिवार के लिए मान्य | 6 महीने वैधता'},
                                {t:'GOLD CARD', p:'100', c:'card-Gold', d:'100% गारंटीड उपहार | 3 महीने वैधता'},
                                {t:'SILVER CARD', p:'50', c:'card-Silver', d:'लकी ड्रा का सुनहरा मौका | 1 महीना वैधता'}
                            ].map((b, i) => (
                                <div key={i} className={`banner-3d ${b.c} p-16 rounded-[5rem] shadow-2xl border-4 border-white/20 text-left`}>
                                    <h2 className="text-8xl font-black mb-6">{b.t}</h2>
                                    <p className="text-3xl font-bold opacity-90 mb-10 italic leading-relaxed">{b.d}</p>
                                    <div className="text-9xl font-black text-white italic">₹{b.p}</div>
                                </div>
                            ))}
                        </div>

                        <div className="bg-amber-500 text-black py-8 mt-24 font-black text-5xl uppercase italic rounded-[3rem] shadow-2xl animate-bounce">
                            🔥 आज ही कार्ड बुक करवाइए और जीतिए ये इनाम, नहीं तो बेहतरीन डिजिटल सेवा तो है ही! 🔥
                        </div>

                        <div className="flex flex-wrap gap-12 mt-20 justify-center">
                            {['ALL', 'VIP Card', 'Gold Card', 'Silver Card'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-24 py-12 rounded-[4rem] font-black text-6xl uppercase transition-all shadow-2xl ${activeTab === t ? 'bg-amber-500 text-black scale-110' : 'bg-slate-800 text-slate-400'}`}>{t.split(' ')[0]}</button>
                            ))}
                        </div>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-16">
                        {/* 🎁 लपक-झपक इनाम पैनल 🎁 */}
                        <div className="lg:col-span-4 glass p-12 h-[1400px] flex flex-col border-t-[20px] border-amber-500 shadow-2xl">
                            <h2 className="text-[6rem] font-black italic text-amber-500 mb-16 text-center underline decoration-8 tracking-tighter uppercase">51 MEGA PRIZES</h2>
                            <div className="overflow-y-auto pr-6 space-y-12 flex-1 custom-scroll">
                                {PRIZES.map((p) => (
                                    <div key={p.r} className="p-12 rounded-[4.5rem] bg-slate-800/80 border-l-[30px] border-amber-500 prize-glow transition-all hover:scale-105">
                                        <div className="flex items-center gap-12 mb-8">
                                            <div className="w-28 h-28 flex items-center justify-center font-black text-6xl rounded-[3rem] bg-amber-500 text-black">{p.r}</div>
                                            <h4 className="font-black text-6xl text-white tracking-tighter leading-none">{p.n}</h4>
                                        </div>
                                        <p className="text-3xl text-amber-400 font-black mb-4 italic">"{p.m1}"</p>
                                        <p className="text-2xl text-slate-300 font-bold leading-relaxed">{p.m2}</p>
                                    </div>
                                ))}
                                <div className="p-10 bg-green-900/60 border-l-[20px] border-green-500 rounded-[3rem] text-4xl font-black text-center">
                                    + उपहार और कैशबैक धमाका! 🎁💰
                                </div>
                            </div>
                        </div>

                        {/* 🎴 जंबो कार्ड ग्रिड 🎴 */}
                        <div className="lg:col-span-8 glass p-10 h-[1400px] flex flex-col border-t-[20px] border-indigo-600 shadow-2xl">
                            <div className="card-grid overflow-y-auto flex-1 custom-scroll">
                                {cards.filter(c => activeTab === 'ALL' || c.cat === activeTab).map(renderCard)}
                            </div>
                        </div>
                    </div>

                    {/* स्टायलिश बुकिंग & स्टाफ फॉर्म */}
                    {selected && (
                        <div className="fixed inset-0 z-[150] bg-black/99 flex items-center justify-center p-10 backdrop-blur-3xl overflow-y-auto">
                            <div className="glass p-20 w-full max-w-[1300px] border-4 border-amber-500 rounded-[8rem] shadow-2xl">
                                <div className="flex justify-between items-center mb-16 border-b-8 border-slate-700 pb-12">
                                    <h3 className="text-[12rem] font-black text-amber-500 italic leading-none">#{selected.n}</h3>
                                    <div className="text-right">
                                        <span className="bg-amber-500 text-black px-16 py-6 rounded-full text-5xl font-black uppercase shadow-2xl">{selected.cat}</span>
                                        <p className="text-4xl font-bold mt-8 text-slate-400 tracking-widest">{selected.mid}</p>
                                    </div>
                                    <button onClick={() => setSelected(null)} className="text-[14rem] text-slate-700 hover:text-white">&times;</button>
                                </div>

                                {staff ? (
                                    <div className="space-y-16">
                                        <h4 className="text-5xl font-black text-indigo-400 text-center uppercase tracking-widest">Staff Edit Mode: {staff.id}</h4>
                                        <div className="grid md:grid-cols-2 gap-14 bg-slate-900/60 p-16 rounded-[5rem] border-4 border-indigo-500">
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">नाम (Name)</label><input id="s_name" defaultValue={selected.d.name} className="w-full bg-black p-12 rounded-[3rem] text-5xl font-black border-4 border-slate-700" /></div>
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">मोबाइल (Mobile)</label><input id="s_mob" defaultValue={selected.d.mob?.replace(/'/g,'')} className="w-full bg-black p-12 rounded-[3rem] text-5xl font-black border-4 border-slate-700" /></div>
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">आधार (Aadhaar)</label><input id="s_adhar" defaultValue={selected.d.adhar?.replace(/'/g,'')} className="w-full bg-black p-12 rounded-[3rem] text-5xl font-black border-4 border-slate-700" /></div>
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">पेमेंट मोड (Payment)</label><select id="s_pay" defaultValue={selected.d.pay} className="w-full bg-black p-12 rounded-[3rem] text-5xl font-black border-4 border-slate-700"><option value="Cash">Cash</option><option value="Online">Online</option><option value="Airtel">Airtel</option></select></div>
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">रसीद नंबर (Ref ID)</label><input id="s_ref" defaultValue={selected.d.ref} className="w-full bg-black p-12 rounded-[3rem] text-5xl font-black border-4 border-slate-700 text-amber-400" /></div>
                                            <div className="space-y-4"><label className="text-3xl font-black ml-8 text-indigo-400">प्राप्त राशि (Paid ₹)</label><input id="s_paid" type="number" defaultValue={selected.price} className="w-full bg-green-900/40 p-12 rounded-[3rem] text-8xl font-black border-8 border-green-500 text-green-400" /></div>
                                            <input type="hidden" id="s_pan" defaultValue={selected.d.pan} />
                                        </div>
                                        <div className="flex gap-14">
                                            <button onClick={() => staffUpdate('Sold')} className="flex-1 bg-green-600 font-black py-16 rounded-[5rem] text-7xl uppercase italic shadow-2xl hover:bg-white hover:text-black transition-all">VERIFY & SELL ✅</button>
                                            <button onClick={() => staffUpdate('Available')} className="flex-1 bg-slate-700 font-black py-16 rounded-[5rem] text-7xl uppercase hover:bg-red-600 transition-all">REJECT & RESET ❌</button>
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={bookCard} className="space-y-16">
                                        <div className="space-y-6"><label className="text-4xl font-black ml-12 text-slate-400 uppercase tracking-widest">ग्राहक का पूरा नाम *</label><input name="Customer_Name" required placeholder="अपना नाम लिखें" className="w-full bg-slate-900 p-14 rounded-[4rem] font-black border-[12px] border-slate-800 focus:border-amber-500 outline-none text-[5rem] text-white" /></div>
                                        <div className="grid md:grid-cols-2 gap-16">
                                            <div className="space-y-6"><label className="text-4xl font-black ml-12 text-slate-400 uppercase tracking-widest">मोबाइल नंबर *</label><input name="Mobile" type="tel" pattern="[0-9]{10}" required className="w-full bg-slate-900 p-14 rounded-[4rem] font-black border-[12px] border-slate-800 focus:border-amber-500 outline-none text-[5rem] text-white" /></div>
                                            <div className="space-y-6"><label className="text-4xl font-black ml-12 text-slate-400 uppercase tracking-widest">आधार कार्ड नंबर *</label><input name="Aadhaar" type="tel" pattern="[0-9]{12}" required className="w-full bg-slate-900 p-14 rounded-[4rem] font-black border-[12px] border-slate-800 focus:border-amber-500 outline-none text-[5rem] text-white" /></div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-16">
                                            <div className="space-y-6"><label className="text-4xl font-black ml-12 text-slate-400 uppercase tracking-widest">जन्मतिथि (DOB)</label><input name="DOB" type="date" className="w-full bg-slate-900 p-14 rounded-[4rem] font-black border-[12px] border-slate-800 text-6xl text-white" /></div>
                                            <div className="space-y-6"><label className="text-4xl font-black ml-12 text-slate-400 uppercase tracking-widest">गाँव / शहर का नाम</label><input name="Village" className="w-full bg-slate-900 p-14 rounded-[4rem] font-black border-[12px] border-slate-800 text-6xl text-white" /></div>
                                        </div>
                                        <div className="flex gap-16 pt-12">
                                            <button type="submit" className="flex-1 bg-amber-500 text-black font-black py-16 rounded-[6rem] text-[7rem] uppercase italic shadow-2xl hover:bg-white transition-all">CONFIRM BOOKING 🔱</button>
                                            <button type="button" onClick={() => setSelected(null)} className="bg-slate-700 text-white font-black px-24 py-16 rounded-[6rem] text-6xl">CANCEL</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ✅ सफलता & हिंग्लिश व्हाट्सएप रिपोर्ट ✅ */}
                    {successModal && (
                        <div className="fixed inset-0 z-[200] bg-black/99 flex items-center justify-center p-10">
                            <div className="glass p-28 max-w-[1400px] text-center border-t-[35px] border-green-500 rounded-[8rem] shadow-2xl">
                                <i className="fa-regular fa-circle-check text-[25rem] text-green-500 mb-20 animate-bounce"></i>
                                <h3 className="text-[9rem] font-black mb-12 text-white italic uppercase tracking-tighter leading-none">SUCCESSFUL!</h3>
                                <p className="text-slate-300 text-6xl mb-24 font-bold italic tracking-tight">हुकुम, आपका कार्ड #{successModal.n} पेंडिंग है। व्हाट्सएप पर रिपोर्ट भेजें!</p>
                                <a href={`https://wa.me/917229874128?text=${encodeURIComponent(`🔱 *${COMPANY}* 🔱\n_"${SLOGAN}"_\n━━━━━━━━━━━━━━━━━━━━━━\n🚩 जय माता दी! हुकुम,\n\n🔖 *बुकिंग विवरण (DETAILS)*:\n• नाम: ${successModal.name}\n• कार्ड नंबर: #${successModal.n}\n• आईडी (ID): ${successModal.mid}\n\n✅ *Status*: पेंडिंग (वेरिफिकेशन के लिए सूचित किया गया)\n\nइनाम जीतने का मौका और डिजिटल सेवा का आनंद लें। \nThank you, DPSG! 🔱🚩`)}`} target="_blank" onClick={()=>setSuccessModal(null)} className="flex items-center justify-center gap-16 w-full bg-[#25D366] text-white font-black py-20 rounded-[7rem] text-[9rem] shadow-2xl hover:scale-105 transition-transform">
                                    <i className="fa-brands fa-whatsapp text-[18rem]"></i> SEND REPORT
                                </a>
                            </div>
                        </div>
                    )}

                    <div className="mt-[500px] mb-40 text-center">
                        <button onClick={()=>{let u=prompt("Staff ID:");let p=prompt("Pass:");if(ADMINS[u]===p)setStaff({id:u,pass:p});else alert("Fail");}} className="bg-indigo-600/30 hover:bg-indigo-600 text-indigo-400 hover:text-white px-40 py-20 rounded-[6rem] text-7xl font-black uppercase border-[15px] border-indigo-600 transition-all shadow-2xl tracking-[0.5em] italic">
                            🔱 STAFF CONTROL CENTER 🔱
                        </button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
