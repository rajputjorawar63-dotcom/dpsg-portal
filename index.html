<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Master Portal 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script>
        // 🛡️ ANTI-HACKER SECURITY SCRIPT 🛡️
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0))) || (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
                return false;
            }
        };
        setInterval(() => { console.clear(); console.log("%cSTOP! DPSG SECURED AREA", "color: red; font-size: 40px; font-weight: bold;"); }, 2000);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #070b14; color: white; margin: 0; user-select: none; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; max-height: 550px; overflow-y: auto; padding: 15px; background: #0a0f1c; border-radius: 1rem; border: 1px solid #1e293b; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 13px; border: 1px solid rgba(255,255,255,0.05); }
        .available { background: #1e293b; color: #94a3b8; }
        .available:hover { background: #fbbf24; color: #000; transform: scale(1.05); }
        .pending { background: #f59e0b; color: #000; border: 2px solid #b45309; animation: pulse 2s infinite; pointer-events: none; }
        .sold { background: #ef4444; color: #fff; opacity: 0.4; pointer-events: none; }
        .selected { background: #fbbf24 !important; color: #000 !important; transform: scale(1.1); border: 2px solid #fff; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzApJwnfryMBhVujtfGJo-HbWWFTiM2guvLQkxX4CoSDbGp1opeKc7SlE9ObvkgrPgrPw/exec";
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/11UVWUzSUwI2mm9tsBMaNARgUnfwIZ5TKDaHsKb4Cl58/export?format=csv";
        const _S = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020" };
        
        // Compact Prize Logic
        const P = [{r:1,n:"₹5000 Cash 💰",d:"किस्मत बदलने का असली मौका"},{r:2,n:"LED TV 📺",d:"32 इंच की बड़ी स्क्रीन जीतने का चांस"},{r:3,n:"Kids Bicycle 🚲",d:"बचपन का सबसे प्यारा तोहफा"},{r:4,n:"Ceiling Fan 🌀",d:"तेज़ हवा और सुकून भरी नींद"},{r:5,n:"Bati Oven 🍳",d:"गरमा-गरम बाटी का स्वाद"},{r:6,n:"Keypad Mobile 📱",d:"भरोसेमंद मोबाइल"},{r:7,n:"Smart Watch ⌚",d:"स्मार्ट लुक"},{r:8,n:"Power Bank 🔋",d:"फुल चार्ज"},{r:9,n:"Sports Shoes 👟",d:"रफ़्तार का मेल"},{r:10,n:"Riding Helmet 🪖",d:"सुरक्षा और स्टाइल"}];
        for(let i=11;i<=51;i++) P.push({r:i,n:`धमाका इनाम #${i} 🎁`,d:"DPSG स्पेशल उपहार"}); P.push({r:52,n:"🎁 निश्चित उपहार",d:"DPSG में कोई नहीं हारता!"});

        const App = () => {
            const [cards, setCards] = useState([]);
            const [filter, setFilter] = useState('ALL');
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(null);
            const [loading, setLoading] = useState(true);
            const [successBooking, setSuccessBooking] = useState(null);

            const loadData = () => {
                fetch(SHEET_CSV + "?t=" + Date.now()).then(r => r.text()).then(csv => {
                    const rows = csv.split('\n').map(row => row.split(','));
                    let parsed = [];
                    for(let i=1; i<=1000; i++) {
                        let stat = (rows[i] && rows[i][4]) ? rows[i][4].trim().toLowerCase() : "";
                        parsed.push({ num: i, id: `DPSG-26-${String(i).padStart(4,'0')}`, status: (stat==="sold"||stat==="सॉल्ड")?"sold":(stat==="pending"||stat==="पेंडिंग"?"pending":"available"), data: { name: rows[i]?.[6]||"", mob: rows[i]?.[7]||"", aadhar: rows[i]?.[10]||"" } });
                    }
                    setCards(parsed); setLoading(false);
                });
            };

            useEffect(() => { loadData(); const itvl = setInterval(loadData, 10000); return () => clearInterval(itvl); }, []);

            const filteredCards = filter === 'ALL' ? cards : cards.filter(c => c.status === filter.toLowerCase());

            const handleBooking = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const params = new URLSearchParams(fd);
                params.append("action", "BOOK");
                params.append("S_No", selected.num.toString());
                const cName = fd.get("Customer_Name");

                setCards(prev => prev.map(c => c.num === selected.num ? { ...c, status: "pending" } : c));
                setSuccessBooking({ num: selected.num, name: cName });
                setSelected(null);
                try { await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' }); } catch(err) {}
            };

            const handleVerify = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const params = new URLSearchParams(fd);
                params.append("action", "VERIFY"); params.append("S_No", selected.num.toString());
                params.append("staffID", staff.id); params.append("staffPass", staff.pass);
                setCards(prev => prev.map(c => c.num === selected.num ? { ...c, status: "sold" } : c));
                setSelected(null); alert("✅ कार्ड SOLD!");
                try { await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' }); } catch(err) {}
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#070b14] text-amber-500 font-black text-2xl tracking-widest animate-pulse">DPSG PRO INITIALIZING...</div>;

            return (
                <div className="max-w-6xl mx-auto px-4 py-8">
                    <header className="glass-card p-6 text-center mb-6 border-b-2 border-amber-500 shadow-[0_10px_30px_rgba(245,158,11,0.1)]">
                        <h1 className="text-4xl md:text-5xl font-black italic text-white tracking-tighter">DPSG <span className="text-amber-500">PRO</span> 2026</h1>
                        <marquee className="mt-4 bg-amber-500 text-black py-1 font-black text-sm uppercase">🔥 मात्र ₹100 में ₹5000 नकद और 51 महा-इनाम जीतने का मौका! अभी लकी नंबर चुनें 🔥</marquee>
                    </header>

                    <div className="grid lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 glass-card p-5 h-[650px] flex flex-col">
                            <h2 className="text-xl font-black italic text-amber-500 mb-4 border-b border-amber-500/30 pb-2">🏆 51 महा-इनाम लिस्ट</h2>
                            <div className="overflow-y-auto pr-2 flex-1 space-y-2">
                                {P.map((p, i) => (
                                    <div key={p.r} className={`p-3 rounded-lg flex items-center gap-3 ${i===51?'bg-green-900/40 border-l-4 border-green-500':'bg-slate-800/50 border-l-4 border-amber-500'}`}>
                                        <div className={`w-8 h-8 flex items-center justify-center font-black rounded-md ${i===51?'bg-green-500':'bg-amber-500 text-black'}`}>{i===51?'🎁':p.r}</div>
                                        <div><h4 className="font-black text-sm">{p.n}</h4><p className="text-[9px] text-slate-400">{p.d}</p></div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="lg:col-span-8 glass-card p-5 h-[650px] flex flex-col">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-black italic text-indigo-400">लकी कार्ड ग्रिड</h2>
                                <div className="flex gap-2 text-[10px] font-black uppercase">
                                    <button onClick={()=>setFilter('ALL')} className={`px-3 py-1 rounded ${filter==='ALL'?'bg-indigo-600':'bg-slate-800'}`}>कुल ({cards.length})</button>
                                    <button onClick={()=>setFilter('AVAILABLE')} className={`px-3 py-1 rounded ${filter==='AVAILABLE'?'bg-slate-600':'bg-slate-800'}`}>खाली</button>
                                    <button onClick={()=>setFilter('PENDING')} className={`px-3 py-1 rounded ${filter==='PENDING'?'bg-amber-500 text-black':'bg-slate-800'}`}>पेंडिंग</button>
                                </div>
                            </div>
                            <div className="card-grid flex-1">
                                {filteredCards.map(c => <div key={c.num} onClick={c.status==='available'?()=>setSelected(c):undefined} className={`grid-item ${c.status} ${selected?.num===c.num?'selected':''}`}>{c.num}</div>)}
                            </div>
                        </div>
                    </div>

                    {/* Booking Modal */}
                    {selected && selected.status === 'available' && (
                        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
                            <div className="glass-card border border-amber-500 p-6 w-full max-w-md">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-white italic">बुक कार्ड: #{selected.num}</h3>
                                    <button onClick={()=>setSelected(null)} className="text-2xl font-black text-slate-500">&times;</button>
                                </div>
                                <form onSubmit={handleBooking} className="space-y-4">
                                    <select name="Category" required className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-white outline-none focus:border-amber-500">
                                        <option value="" disabled selected>कार्ड प्रकार (Normal/VIP/Digital)</option>
                                        <option value="Normal">Normal Card</option>
                                        <option value="VIP">VIP Card</option>
                                        <option value="Digital">Digital Card</option>
                                    </select>
                                    <input name="Customer_Name" placeholder="पूरा नाम (आधार अनुसार)" required className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-white outline-none focus:border-amber-500" />
                                    <input name="Mobile" type="tel" pattern="[0-9]{10}" placeholder="मोबाइल (10 अंक)" required className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-white outline-none focus:border-amber-500" />
                                    <input name="Aadhaar" type="tel" pattern="[0-9]{12}" placeholder="आधार नंबर" required className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-white outline-none focus:border-amber-500" />
                                    <input name="Village" placeholder="गाँव/शहर" required className="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl font-bold text-white outline-none focus:border-amber-500" />
                                    <input type="hidden" name="Base_Price" value="100" />
                                    <button className="w-full bg-amber-500 text-black font-black py-4 rounded-xl text-xl hover:bg-white transition-all uppercase italic mt-2">कन्फर्म बुकिंग 🔱</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* WhatsApp Success Notification Modal */}
                    {successBooking && (
                        <div className="fixed inset-0 z-[60] bg-black/95 flex items-center justify-center p-4">
                            <div className="glass-card border-2 border-green-500 p-8 w-full max-w-md text-center">
                                <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <i className="fa-solid fa-check text-4xl text-white"></i>
                                </div>
                                <h3 className="text-2xl font-black text-white italic mb-2">बुकिंग पेंडिंग में गई!</h3>
                                <p className="text-slate-400 font-bold mb-8">कार्ड #{successBooking.num} सुरक्षित कर लिया गया है। स्टाफ द्वारा पेमेंट वेरीफाई होने पर यह पक्का हो जाएगा।</p>
                                
                                <a href={`https://wa.me/917229874128?text=${encodeURIComponent(`जय माता दी! हुकुम, मैंने DPSG-PRO-2026 पर कार्ड #${successBooking.num} बुक किया है। मेरा नाम ${successBooking.name} है। कृपया पेमेंट लेकर इसे वेरिफाई करें।`)}`} target="_blank" onClick={()=>setSuccessBooking(null)} className="flex items-center justify-center gap-3 w-full bg-[#25D366] text-white font-black py-4 rounded-xl text-lg hover:opacity-90 transition-opacity mb-4 shadow-[0_0_20px_rgba(37,211,102,0.4)]">
                                    <i className="fa-brands fa-whatsapp text-2xl"></i> WhatsApp पर हमें सूचित करें
                                </a>
                                <button onClick={()=>setSuccessBooking(null)} className="text-slate-500 font-bold underline text-sm">नहीं, धन्यवाद</button>
                            </div>
                        </div>
                    )}

                    {/* Staff Trigger & Panel */}
                    <div className="text-center mt-10 opacity-5 hover:opacity-100">
                        <button onClick={() => { const u=prompt("Admin ID:"); const p=prompt("Pass:"); if(_S[u]===p) setStaff({id:u, pass:p}); }} className="text-[10px] font-black tracking-[1em] uppercase">🔱 Admin Access 🔱</button>
                    </div>
                    {staff && (
                        <div className="fixed inset-0 z-[70] bg-slate-900 p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-6"><h2 className="text-3xl font-black text-amber-500 italic">Welcome, {staff.id}</h2><button onClick={()=>setStaff(null)} className="bg-red-500 text-white px-4 py-2 rounded font-black text-xs">LOGOUT</button></div>
                            <div className="grid md:grid-cols-3 gap-4">
                                {cards.filter(c=>c.status==='pending').map(c => (
                                    <div key={c.id} className="glass-card p-5 border-l-4 border-amber-500">
                                        <h3 className="text-2xl font-black text-white">#{c.num}</h3>
                                        <p className="text-sm font-bold text-slate-400 my-2">{c.data.name} | {c.data.mob}</p>
                                        <button onClick={()=>setSelected(c)} className="w-full bg-green-600 text-white py-2 rounded font-black mt-2">VERIFY PAYMENT</button>
                                    </div>
                                ))}
                            </div>
                            {selected && selected.status === 'pending' && staff && (
                                <div className="fixed inset-0 z-[80] bg-black/95 flex items-center justify-center p-4">
                                    <form onSubmit={handleVerify} className="glass-card border-2 border-green-500 p-6 w-full max-w-md">
                                        <h3 className="text-xl font-black text-green-500 mb-4 text-center">Verify: #{selected.num}</h3>
                                        <input name="Airtel_1" placeholder="Airtel Discount Account (Optional)" className="w-full bg-slate-900 p-3 rounded mb-3 text-white outline-none border border-slate-700" />
                                        <input name="Discount" type="number" placeholder="Discount ₹" defaultValue="0" className="w-full bg-slate-900 p-3 rounded mb-3 text-white outline-none border border-slate-700" />
                                        <input name="Paid" type="number" placeholder="Paid Amount ₹" required className="w-full bg-green-900/50 p-4 rounded mb-4 text-green-400 font-black text-2xl text-center outline-none border-2 border-green-500" />
                                        <button className="w-full bg-green-600 text-white font-black py-3 rounded text-xl mb-3">SOLD ✅</button>
                                        <button type="button" onClick={()=>setSelected(null)} className="w-full text-slate-500 font-bold">Cancel</button>
                                    </form>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
