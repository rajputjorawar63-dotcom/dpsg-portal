<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Rajdhani:wght@700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #010409; color: white; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 3rem; }
        
        /* 💎 3D BANNERS (Single Line) 💎 */
        .banner-row { display: flex; overflow-x: auto; gap: 30px; padding: 20px 10px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .banner-row::-webkit-scrollbar { display: none; }
        .banner-3d { min-width: 320px; flex: 1; transition: 0.5s; transform-style: preserve-3d; scroll-snap-align: center; border-radius: 3rem; padding: 2rem; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .banner-3d:hover { transform: translateY(-10px) rotateY(5deg); box-shadow: 0 30px 60px rgba(0,0,0,0.8); }

        /* 🎴 JUMBO CARDS (No Sticking) 🎴 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px; padding: 30px; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 40px; font-weight: 900; cursor: pointer; border: 4px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 80px; position: relative; box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .grid-item:hover { transform: scale(1.1); border-color: #fbbf24; z-index: 10; box-shadow: 0 0 50px rgba(251,191,36,0.4); }
        
        .card-VIP { background: linear-gradient(135deg, #4f46e5, #1e1b4b); }
        .card-Gold { background: linear-gradient(135deg, #d97706, #451a03); }
        .card-Silver { background: linear-gradient(135deg, #cbd5e1, #475569); color: black; }
        .pending-card { background: #facc15 !important; color: black !important; border: 8px solid #fff; animation: pulse 1.5s infinite; }
        .sold-card { background: #ef4444 !important; opacity: 0.5; pointer-events: none; border: 6px solid #7f1d1d; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.95); } }
        
        /* 🎁 PRIZE GLOW 🎁 */
        .prize-glow { border: 2px solid #fbbf24; animation: flash-glow 2s infinite; }
        @keyframes flash-glow { 0%, 100% { box-shadow: 0 0 5px #fbbf24; } 50% { box-shadow: 0 0 25px #fbbf24; } }
        
        .custom-scroll::-webkit-scrollbar { width: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 10px; }
        
        .live-feed-item { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>

            {r:27, n:"Movie Ticket 🎟️", d:"मनोरंजन का डबल डोज़, जीतें अपनी पसंदीदा फिल्म की टिकट।"},
            {r:28, n:"Umbrella ☂️", d:"बारिश हो या धूप, यह छाता रहेगा हमेशा आपके साथ।"},

            {r:36, n:"Wireless Speaker 🔊", d:"पार्टी का मूड बनाएं, जहाँ भी जाएं संगीत साथ ले जाएं।"},
            {r:37, n:"Water Bottle Set 💧", d:"फ्रिज के लिए बेस्ट और स्टाइलिश वॉटर बॉटल सेट।"},
            {r:38, n:"Lunch Box 🍱", d:"ऑफिस या स्कूल के लिए खाना रहेगा फ्रेश और गरम।"},

            {r:42, n:"Leather Bag 🎒", d:"सामान ले जाने के लिए स्टाइलिश और मजबूत लेदर बैग।"},
            {r:43, n:"20L Water Bottle 🚰", d:"शुद्ध पानी का बड़ा स्टोरेज, घर या ऑफिस के लिए।"},
            {r:44, n:"Bathing Bucket 🪣", d:"घर की डेली जरूरत के लिए मजबूत और टिकाऊ बाल्टी।"},
            {r:45, n:"Mobile Recharge 📱", d:"₹349 का फ्री मोबाइल रिचार्ज, अनलिमिटेड बातों के लिए।"},
            {r:46, n:"Spice Box 🌶️", d:"रसोई को रखें व्यवस्थित, इस सुंदर मसाला दानी के साथ।"},
            {r:47, n:"Veg Chopper 🔪", d:"सब्जी काटना अब होगा मिनटों का काम, बिना किसी मेहनत के।"},
            {r:48, n:"Photo Frame 🖼️", d:"अपनी खूबसूरत यादों को सहेजने के लिए प्यारा फोटो फ्रेम।"},
            {r:49, n:"Water Camper 🧊", d:"ठंडे पानी का कैंपर, पिकनिक या फंक्शन के लिए बेस्ट।"},
            {r:50, n:"Makeup Kit 💄", d:"खूबसूरती को निखारें, जीतें एक शानदार मेकअप किट।"},
            {r:51, n:"Electric Iron 🧲", d:"कपड़ों पर लाएं परफेक्ट चमक, जीतें एक हाई-क्वालिटी प्रेस।"}
        ];

        const App = () => {
            const [cards, setCards] = useState([]);
            const [activeTab, setActiveTab] = useState('ALL'); 
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(null);
            const [staffUPI, setStaffUPI] = useState("");
            const [editMode, setEditMode] = useState(false); 
            const [successModal, setSuccessModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [localLocks, setLocalLocks] = useState(new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]')));

            const loadFallbackData = () => {
                let temp = [];
                for(let i=1; i<=1000; i++) {
                    let cat = i <= 100 ? "VIP Card" : i <= 600 ? "Gold Card" : "Silver Card";
                    temp.push({ n: i, status: 'Available', cat, price: (i<=100?500:i<=600?100:50), mid: `DPSG-26-113-${i.toString().padStart(4,'0')}`, d: {} });
                }
                setCards(temp); setLoading(false);
            };

            const loadData = () => {
                fetch(CSV_URL + "?t=" + Date.now()).then(r => r.text()).then(csv => {
                    if(csv.includes("<!DOCTYPE html>")) throw new Error("Google Login Error");
                    const rows = csv.split('\n').map(r => r.split(','));
                    let temp = [];
                    for(let i=1; i<=1000; i++) {
                        let rD = rows.find(r => r[0] == i) || [];
                        let s = rD[4]?.trim() || 'Available';
                        if(s === "सॉल्ड") s = "Sold"; if(s === "पेंडिंग") s = "Pending";
                        let cat = i <= 100 ? "VIP Card" : i <= 600 ? "Gold Card" : "Silver Card";
                        temp.push({ n: i, status: s, cat, price: rD[16] || (i<=100?500:i<=600?100:50), mid: rD[3] || `DPSG-26-113-${i.toString().padStart(4,'0')}`, d: { name: rD[6], mob: rD[7], vill: rD[9], adhar: rD[10], pan: rD[11], pay: rD[12], ref: rD[13], dob: rD[8] } });
                    }
                    setCards(temp); setLoading(false);
                }).catch(e => { console.error("Sheet Load Error:", e); loadFallbackData(); });
            };

            useEffect(() => { 
                loadData(); 
                const interval = setInterval(loadData, 8000); 
                // 🛑 ANTI-CRASH FAILSAFE: If sheet doesn't load in 3 seconds, force load empty cards
                const timeout = setTimeout(() => { if(loading) loadFallbackData(); }, 3000);
                return () => { clearInterval(interval); clearTimeout(timeout); };
            }, []);

            const pendingCards = cards.filter(c => c.status === 'Pending' || localLocks.has(c.n));

            const bookCard = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const n = selected.n;
                const newLocks = new Set(localLocks).add(n);
                setLocalLocks(newLocks);
                localStorage.setItem('dps_locks', JSON.stringify([...newLocks]));
                
                const params = new URLSearchParams(Object.fromEntries(fd));
                params.append("action", "BOOK"); params.append("S_No", n.toString()); 
                params.append("Category", selected.cat); params.append("Base_Price", selected.price);
                
                fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                setSuccessModal({ n, name: fd.get("Customer_Name"), mid: selected.mid });
                setSelected(null);
            };

            const staffQuickAction = (cardItem, status) => {
                const params = new URLSearchParams({
                    action: 'UPDATE', S_No: cardItem.n, Status: status, staffID: staff.id, staffPass: staff.pass,
                    Customer_Name: cardItem.d.name, Mobile: cardItem.d.mob, Aadhaar: cardItem.d.adhar, 
                    PAN: cardItem.d.pan, Payment_Mode: cardItem.d.pay, Payment_Ref: cardItem.d.ref, 
                    Paid: cardItem.price, LogMsg: `Quick ${status} by ${staff.id}`
                });
                fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                if(status === 'Available') setLocalLocks(prev => { const n = new Set(prev); n.delete(cardItem.n); return n; });
                alert(`✅ Card #${cardItem.n} Marked as ${status}!`);
                setSelected(null);
            };

            const staffFullUpdate = (status) => {
                const params = new URLSearchParams({
                    action: 'UPDATE', S_No: selected.n, Status: status, staffID: staff.id, staffPass: staff.pass,
                    Customer_Name: document.getElementById('e_name').value, Mobile: document.getElementById('e_mob').value,
                    Aadhaar: document.getElementById('e_adhar').value, PAN: document.getElementById('e_pan').value,
                    Payment_Mode: document.getElementById('e_pay').value, Payment_Ref: document.getElementById('e_ref').value,
                    Paid: document.getElementById('e_paid').value, LogMsg: `Detailed Edit & ${status} by ${staff.id}`
                });
                fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                if(status === 'Available') setLocalLocks(prev => { const n = new Set(prev); n.delete(selected.n); return n; });
                alert(`✅ Update Successful!`);
                setSelected(null); setEditMode(false);
            };

            const renderCard = (c) => {
                const isLocked = localLocks.has(c.n) || c.status === 'Pending';
                const s = c.status === 'Sold' ? 'Sold' : isLocked ? 'Pending' : 'Available';
                const color = s === 'Sold' ? 'sold-card' : s === 'Pending' ? 'pending-card' : `card-${c.cat.split(' ')[0]}`;
                return (
                    <div key={c.n} onClick={() => { setSelected(c); setEditMode(false); }} className={`grid-item ${color}`}>
                        <span className="z-10 relative">{c.n}</span>
                        {s === 'Pending' && <i className="fa-solid fa-clock absolute text-black/20 text-[60px]"></i>}
                        {s === 'Sold' && <i className="fa-solid fa-lock absolute text-white/30 text-[60px]"></i>}
                    </div>
                );
            };

            if(loading) return <div className="h-screen flex items-center justify-center font-black text-amber-500 text-6xl animate-pulse italic">DPSG Loading...</div>;

            return (
                <div className="max-w-[1600px] mx-auto p-4 py-10">
                    <header className="text-center mb-16">
                        <h1 className="text-[6rem] md:text-[8rem] font-black italic text-white rajdhani tracking-tighter drop-shadow-2xl leading-none">{COMPANY}</h1>
                        <p className="text-amber-500 text-2xl font-bold uppercase tracking-widest mt-4 italic">{SLOGAN}</p>
                        
                        {/* 💎 3D BANNERS 💎 */}
                        <div className="banner-row mt-12">
                            <div className="banner-3d card-VIP text-left border-2 border-indigo-400">
                                <h2 className="text-4xl font-black mb-2">VIP CARD <span className="float-right">₹500</span></h2>
                                <p className="text-lg font-bold opacity-90">पूरे परिवार के लिए मान्य | 6 महीने वैधता | 380 फोटो या 190 प्रिंट | 100% फ्री ई-मित्र सेवा | ₹100 Cash Back + धमाका</p>
                            </div>
                            <div className="banner-3d card-Gold text-left border-2 border-yellow-500">
                                <h2 className="text-4xl font-black mb-2">GOLD CARD <span className="float-right">₹100</span></h2>
                                <p className="text-lg font-bold opacity-90">1 व्यक्ति | 3 महीने वैधता | 100 फोटो या 52 प्रिंट | 50% छूट ई-मित्र | 100% गारंटीड उपहार</p>
                            </div>
                            <div className="banner-3d card-Silver text-left border-2 border-slate-400">
                                <h2 className="text-4xl font-black mb-2">SILVER CARD <span className="float-right">₹50</span></h2>
                                <p className="text-lg font-bold opacity-90">1 व्यक्ति | 1 महीना वैधता | 40 फोटो या 21 प्रिंट | लकी ड्रा का शानदार अवसर</p>
                            </div>
                        </div>
                    </header>

                    {/* 🔥 STAFF LIVE FEED DASHBOARD 🔥 */}
                    {staff && (
                        <div className="mb-12 glass p-6 border-t-4 border-indigo-500 shadow-2xl">
                            <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                                <h2 className="text-3xl font-black text-indigo-400"><i className="fa-solid fa-satellite-dish animate-pulse text-red-500"></i> LIVE PENDING CARDS</h2>
                                <div className="flex gap-4">
                                    <input type="text" placeholder="Your UPI ID (Optional)" value={staffUPI} onChange={(e)=>setStaffUPI(e.target.value)} className="bg-black border-2 border-slate-700 p-2 rounded text-white font-bold" />
                                    <span className="bg-indigo-600 px-4 py-2 rounded font-black text-white shadow-lg">STAFF: {staff.id}</span>
                                </div>
                            </div>
                            <div className="flex flex-col gap-4 max-h-[400px] overflow-y-auto custom-scroll pr-4">
                                {pendingCards.length === 0 ? <p className="text-slate-400 italic font-bold">No pending bookings at the moment. Waiting for customers...</p> : 
                                pendingCards.map(c => (
                                    <div key={c.n} className="live-feed-item bg-slate-900 p-5 rounded-2xl flex flex-col md:flex-row justify-between items-center border-l-8 border-yellow-500 shadow-xl gap-4">
                                        <div className="flex items-center w-full md:w-auto">
                                            <span className="bg-yellow-500 text-black px-4 py-2 rounded font-black text-2xl mr-4">#{c.n}</span>
                                            <div>
                                                <p className="font-black text-2xl text-white">{c.d.name || 'No Name Provided'}</p>
                                                <p className="text-slate-400 font-bold"><i className="fa-solid fa-phone text-sm"></i> {c.d.mob || 'N/A'} | <i className="fa-solid fa-money-bill text-sm"></i> Mode: {c.d.pay || 'N/A'}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-3 w-full md:w-auto">
                                            <button onClick={() => { setSelected(c); setEditMode(true); }} className="flex-1 md:flex-none bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-black shadow-lg"><i className="fa-solid fa-pen"></i> Edit (✏️)</button>
                                            <button onClick={() => staffQuickAction(c, 'Sold')} className="flex-1 md:flex-none bg-green-600 hover:bg-green-500 px-6 py-3 rounded-xl font-black shadow-lg"><i className="fa-solid fa-check"></i> Verify ✅</button>
                                            <button onClick={() => staffQuickAction(c, 'Available')} className="flex-1 md:flex-none bg-red-600 hover:bg-red-500 px-6 py-3 rounded-xl font-black shadow-lg"><i className="fa-solid fa-xmark"></i> Reject ❌</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="flex flex-wrap gap-6 mb-10 justify-center">
                        {['ALL', 'VIP Card', 'Gold Card', 'Silver Card'].map(t => (
                            <button key={t} onClick={() => setActiveTab(t)} className={`px-10 py-4 rounded-full font-black text-2xl uppercase transition-all shadow-xl ${activeTab === t ? 'bg-amber-500 text-black scale-110' : 'bg-slate-800 text-slate-400'}`}>{t}</button>
                        ))}
                    </div>

                    <div className="grid lg:grid-cols-12 gap-10">
                        {/* 🎁 51 PRIZES EXACT LIST 🎁 */}
                        <div className="lg:col-span-4 glass p-6 h-[1000px] flex flex-col border-t-8 border-amber-500">
                            <h2 className="text-4xl font-black italic text-amber-500 mb-8 text-center underline">51 MEGA PRIZES</h2>
                            <div className="overflow-y-auto pr-4 space-y-6 flex-1 custom-scroll">
                                {PRIZES.map((p) => (
                                    <div key={p.r} className="p-6 rounded-3xl bg-slate-800/80 prize-glow">
                                        <div className="flex items-center gap-4 mb-2">
                                            <div className="w-14 h-14 flex items-center justify-center font-black text-2xl rounded-full bg-amber-500 text-black shrink-0">{p.r}</div>
                                            <h4 className="font-black text-2xl text-white leading-tight">{p.n}</h4>
                                        </div>
                                        <p className="text-sm text-slate-300 font-bold ml-16">{p.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 🎴 JUMBO GRID 🎴 */}
                        <div className="lg:col-span-8 glass p-6 h-[1000px] flex flex-col border-t-8 border-indigo-600">
                            <div className="card-grid overflow-y-auto flex-1 custom-scroll">
                                {cards.filter(c => activeTab === 'ALL' || c.cat === activeTab).map(renderCard)}
                            </div>
                        </div>
                    </div>

                    {/* 📜 TERMS & CONDITIONS 📜 */}
                    <div className="mt-16 glass p-8 border-l-8 border-red-500">
                        <h3 className="text-3xl font-black mb-4 text-red-400">📜 नियम एवं शर्तें (Terms & Conditions)</h3>
                        <ul className="list-disc ml-8 text-lg font-bold space-y-2 opacity-90">
                            <li>कार्ड में शामिल फोटो केवल पासपोर्ट साइज ही होंगे। प्रिंट केवल A4 (B&W) होंगे।</li>
                            <li>1000 कार्ड बिकने के बाद ही स्क्रैच और आगे की सुविधा दी जाएगी। ग्राहक स्वयं स्क्रैच न करें।</li>
                            <li>ई-मित्र सरकारी फीस ग्राहक को ही देनी होगी।</li>
                            <li className="text-amber-400">यदि 1000 कार्ड नहीं बिकते हैं, तो 30 दिन में कार्ड वापस लेकर पैसे रिफंड कर दिए जाएंगे।</li>
                            <li>संपर्क सूत्र: 7229874128</li>
                        </ul>
                    </div>

                    {/* MODAL: CUSTOMER FORM OR STAFF EDIT */}
                    {selected && (
                        <div className="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 backdrop-blur-xl overflow-y-auto">
                            <div className="glass p-10 w-full max-w-4xl border-4 border-amber-500 rounded-3xl shadow-2xl my-8">
                                <div className="flex justify-between items-center mb-8 border-b-2 border-slate-700 pb-4">
                                    <h3 className="text-6xl font-black text-amber-500 italic">#{selected.n}</h3>
                                    <div className="text-right">
                                        <span className="bg-amber-500 text-black px-6 py-2 rounded-full text-2xl font-black uppercase">{selected.cat}</span>
                                        <p className="text-sm font-bold mt-2 text-slate-400">{selected.mid}</p>
                                    </div>
                                    <button onClick={() => setSelected(null)} className="text-6xl text-slate-500 hover:text-white">&times;</button>
                                </div>

                                {staff && editMode ? (
                                    <div className="space-y-6">
                                        <h4 className="text-2xl font-black text-indigo-400 flex items-center gap-2"><i className="fa-solid fa-pen"></i> Staff Edit Mode</h4>
                                        <div className="grid md:grid-cols-2 gap-6 bg-slate-900/60 p-6 rounded-xl border border-indigo-500">
                                            <div><label className="text-sm font-bold text-indigo-300">नाम (Name)</label><input id="e_name" defaultValue={selected.d.name} className="w-full bg-black p-3 rounded font-bold border border-slate-700 text-white" /></div>
                                            <div><label className="text-sm font-bold text-indigo-300">मोबाइल (Mobile)</label><input id="e_mob" defaultValue={selected.d.mob?.replace(/'/g,'')} className="w-full bg-black p-3 rounded font-bold border border-slate-700 text-white" /></div>
                                            <div><label className="text-sm font-bold text-indigo-300">आधार (Aadhaar)</label><input id="e_adhar" defaultValue={selected.d.adhar?.replace(/'/g,'')} className="w-full bg-black p-3 rounded font-bold border border-slate-700 text-white" /></div>
                                            <div><label className="text-sm font-bold text-indigo-300">पेमेंट मोड</label><select id="e_pay" defaultValue={selected.d.pay} className="w-full bg-black p-3 rounded font-bold border border-slate-700"><option value="Cash">Cash</option><option value="PhonePe/GPay">PhonePe / GPay</option><option value="Airtel">Airtel Bank</option></select></div>
                                            <div><label className="text-sm font-bold text-indigo-300">रसीद नंबर (Ref ID)</label><input id="e_ref" defaultValue={selected.d.ref} className="w-full bg-black p-3 rounded font-bold border border-slate-700 text-amber-400" /></div>
                                            <div><label className="text-sm font-bold text-indigo-300">प्राप्त राशि ₹</label><input id="e_paid" type="number" defaultValue={selected.price} className="w-full bg-green-900/40 p-3 rounded font-bold border-2 border-green-500 text-green-400" /></div>
                                            <input type="hidden" id="e_pan" defaultValue={selected.d.pan} />
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={() => staffFullUpdate('Sold')} className="flex-1 bg-green-600 font-black py-4 rounded-xl text-xl uppercase shadow-xl hover:bg-green-500">✅ Update & Sold</button>
                                            <button onClick={() => staffFullUpdate('Available')} className="flex-1 bg-slate-700 font-black py-4 rounded-xl text-xl uppercase hover:bg-red-600">❌ Reject & Clear</button>
                                        </div>
                                    </div>
                                ) : staff && selected.status !== 'Available' && !editMode ? (
                                    <div className="text-center py-10">
                                        <h4 className="text-4xl font-black text-white">Card Locked</h4>
                                        <p className="text-xl text-slate-400 mt-4">Current Status: <span className="text-amber-500 font-black">{selected.status}</span></p>
                                        <button onClick={() => setEditMode(true)} className="mt-8 bg-blue-600 px-10 py-4 rounded-full font-black text-2xl shadow-xl hover:bg-blue-500"><i className="fa-solid fa-pen"></i> Edit Detail (✏️)</button>
                                    </div>
                                ) : (
                                    <form onSubmit={bookCard} className="space-y-6">
                                        <div><label className="text-sm font-bold text-slate-400 uppercase">पूरा नाम *</label><input name="Customer_Name" required className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 focus:border-amber-500 outline-none text-xl" /></div>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div><label className="text-sm font-bold text-slate-400 uppercase">मोबाइल *</label><input name="Mobile" type="tel" pattern="[0-9]{10}" required className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 focus:border-amber-500 outline-none text-xl" /></div>
                                            <div><label className="text-sm font-bold text-slate-400 uppercase">आधार *</label><input name="Aadhaar" type="tel" pattern="[0-9]{12}" required className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 focus:border-amber-500 outline-none text-xl" /></div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div><label className="text-sm font-bold text-slate-400 uppercase">जन्मतिथि (DOB)</label><input name="DOB" type="date" className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 outline-none text-xl" /></div>
                                            <div><label className="text-sm font-bold text-slate-400 uppercase">गाँव / शहर</label><input name="Village" className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 outline-none text-xl" /></div>
                                        </div>
                                        <div><label className="text-sm font-bold text-slate-400 uppercase">पेमेंट मोड *</label><select name="Payment_Mode" required className="w-full bg-slate-900 p-4 rounded-xl font-bold border-2 border-slate-700 text-xl"><option value="" disabled selected>Select Mode</option><option value="Cash">Cash</option><option value="PhonePe/GPay">PhonePe / GPay</option><option value="Airtel">Airtel Bank</option></select></div>
                                        
                                        {/* 📁 UPLOAD OPTION 📁 */}
                                        <div className="bg-slate-800 p-4 rounded-xl border border-dashed border-slate-500 mt-4">
                                            <label className="text-sm font-bold text-amber-400 mb-2 block"><i className="fa-solid fa-cloud-arrow-up"></i> फोटो/वीडियो अपलोड करें (Optional)</label>
                                            <input type="file" accept="image/*,video/*" className="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-amber-500 file:text-black hover:file:bg-amber-400 cursor-pointer" />
                                            <p className="text-xs text-slate-500 mt-2">*दस्तावेज सीधे DPSG स्टाफ के पास सुरक्षित रहेंगे।</p>
                                        </div>

                                        <div className="flex gap-6 pt-6">
                                            <button type="submit" className="flex-1 bg-amber-500 text-black font-black py-4 rounded-2xl text-2xl uppercase italic shadow-xl hover:bg-white transition-all">CONFIRM 🔱</button>
                                        </div>
                                    </form>
                                )}
                            </div>
                        </div>
                    )}

                    {/* ✅ HINGLISH WHATSAPP SUCCESS ✅ */}
                    {successModal && (
                        <div className="fixed inset-0 z-[200] bg-black/98 flex items-center justify-center p-4">
                            <div className="glass p-12 max-w-2xl text-center border-t-8 border-green-500 rounded-3xl shadow-2xl">
                                <i className="fa-regular fa-circle-check text-8xl text-green-500 mb-6 animate-bounce"></i>
                                <h3 className="text-4xl font-black mb-4 text-white italic uppercase">BOOKING SUCCESSFUL!</h3>
                                <p className="text-slate-300 text-xl mb-8 font-bold">हुकुम, आपका कार्ड #{successModal.n} पेंडिंग है। व्हाट्सएप पर रिपोर्ट भेजें!</p>
                                <a href={`https://wa.me/917229874128?text=${encodeURIComponent(`🔱 *${COMPANY}* 🔱\n_"${SLOGAN}"_\n━━━━━━━━━━━━━━━━━━━━━━\n🚩 जय माता दी! हुकुम,\n\n🔖 *बुकिंग विवरण (DETAILS)*:\n• नाम: ${successModal.name}\n• कार्ड नंबर: #${successModal.n}\n• आईडी (ID): ${successModal.mid}\n\n✅ *Status*: पेंडिंग (Payment Verification Needed)\n\nThank you for choosing DPSG! 🔱🚩`)}`} target="_blank" onClick={()=>setSuccessModal(null)} className="flex items-center justify-center gap-4 w-full bg-[#25D366] text-white font-black py-4 rounded-2xl text-2xl shadow-xl hover:scale-105 transition-transform">
                                    <i className="fa-brands fa-whatsapp text-4xl"></i> SEND REPORT
                                </a>
                            </div>
                        </div>
                    )}

                    <div className="mt-20 mb-10 text-center">
                        <button onClick={()=>{let u=prompt("Staff ID:");let p=prompt("Pass:");if(ADMINS[u]===p)setStaff({id:u,pass:p});else alert("Access Denied");}} className="text-slate-500 hover:text-white px-8 py-3 rounded-full text-sm font-black uppercase border border-slate-700 transition-all tracking-widest">
                            🔱 STAFF LOGIN 🔱
                        </button>
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
