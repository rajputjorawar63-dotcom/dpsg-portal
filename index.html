<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPSG Master PRO 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;900&family=Rajdhani:wght@700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #010409; color: white; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 2rem; }
        
        /* 🎴 असली जंबो कार्ड ग्रिड - विशाल डब्बे 🎴 */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 40px; padding: 40px; }
        .grid-item { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 40px; font-weight: 900; cursor: pointer; border: 4px solid rgba(255,255,255,0.1); transition: 0.3s; font-size: 80px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        .grid-item:hover { transform: scale(1.08); border-color: #fff; box-shadow: 0 25px 50px rgba(251,191,36,0.3); }
        
        .card-VIP { background: linear-gradient(135deg, #4f46e5, #1e1b4b); }
        .card-Gold { background: linear-gradient(135deg, #d97706, #451a03); }
        .card-Silver { background: linear-gradient(135deg, #cbd5e1, #475569); color: black; }
        
        .pending-card { background: #facc15 !important; color: black !important; border: 8px solid #fff; pointer-events: none; animation: pulse 1.5s infinite; } 
        .sold-card { background: #ef4444 !important; opacity: 0.5; pointer-events: none; border: 8px solid #7f1d1d; } 

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        ::-webkit-scrollbar { width: 14px; } ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const APP_URL = "https://script.google.com/macros/s/AKfycbzApJwnfryMBhVujtfGJo-HbWWFTiM2guvLQkxX4CoSDbGp1opeKc7SlE9ObvkgrPgrPw/exec";
        const CSV_URL = "https://docs.google.com/spreadsheets/d/11UVWUzSUwI2mm9tsBMaNARgUnfwIZ5TKDaHsKb4Cl58/export?format=csv";
        const ADMINS = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020" };

        const App = () => {
            const [cards, setCards] = useState([]);
            const [activeTab, setActiveTab] = useState('ALL'); 
            const [selected, setSelected] = useState(null);
            const [staff, setStaff] = useState(null);
            const [successModal, setSuccessModal] = useState(null);
            const [loading, setLoading] = useState(true);
            const [paymentMode, setPaymentMode] = useState("");
            const [localLocks, setLocalLocks] = useState(new Set(JSON.parse(localStorage.getItem('dps_locks') || '[]')));

            const loadData = () => {
                fetch(CSV_URL + "?t=" + Date.now()).then(r => r.text()).then(csv => {
                    const rows = csv.split('\n').map(r => r.split(','));
                    let temp = [];
                    for(let i=1; i<=1000; i++) {
                        let rD = rows.find(r => r[0] == i) || [];
                        let s = rD[4]?.trim() || 'Available';
                        if(s === "सॉल्ड") s = "Sold"; if(s === "पेंडिंग") s = "Pending";
                        let cat = i <= 100 ? "VIP Card" : i <= 600 ? "Gold Card" : "Silver Card";
                        temp.push({ n: i, status: s, cat, price: rD[16] || (i<=100?500:i<=600?100:50), d: { name: rD[6], mob: rD[7], vill: rD[9], adhar: rD[10], pan: rD[11], pay: rD[12] } });
                    }
                    setCards(temp); setLoading(false);
                });
            };

            useEffect(() => { loadData(); const itvl = setInterval(loadData, 10000); return () => clearInterval(itvl); }, []);

            const bookCard = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const n = selected.n;
                const newLocks = new Set(localLocks).add(n);
                setLocalLocks(newLocks);
                localStorage.setItem('dps_locks', JSON.stringify([...newLocks]));
                
                const params = new URLSearchParams(Object.fromEntries(fd));
                params.append("action", "BOOK"); params.append("S_No", n.toString()); 
                params.append("Category", selected.cat); params.append("Base_Price", selected.price);
                params.append("Payment_Mode", paymentMode);
                
                await fetch(APP_URL, { method: 'POST', body: params, mode: 'no-cors' });
                setSuccessModal({ n, name: fd.get("Customer_Name") });
                setSelected(null); setPaymentMode("");
            };

            const renderCard = (c) => {
                const isLocked = localLocks.has(c.n) || c.status === 'Pending';
                const s = c.status === 'Sold' ? 'Sold' : isLocked ? 'Pending' : 'Available';
                const color = s === 'Sold' ? 'sold-card' : s === 'Pending' ? 'pending-card' : `card-${c.cat.split(' ')[0]}`;
                return (
                    <div key={c.n} onClick={s === 'Available' ? () => setSelected(c) : undefined} className={`grid-item ${color}`}>
                        {c.n} {s !== 'Available' && <i className={`fa-solid ${s==='Sold'?'fa-lock':'fa-clock'} absolute text-white/20 text-8xl`}></i>}
                    </div>
                );
            };

            if(loading) return <div className="h-screen flex items-center justify-center font-black text-amber-500 text-8xl animate-pulse">DPSG PRO...</div>;

            return (
                <div className="max-w-[1800px] mx-auto p-4 py-12">
                    <header className="text-center mb-16">
                        <h1 className="text-8xl md:text-[10rem] font-black italic text-white rajdhani drop-shadow-2xl tracking-tighter">DPSG <span className="text-amber-500">PRO</span></h1>
                        <div className="flex flex-wrap gap-8 mt-16 justify-center">
                            {['ALL', 'VIP Card', 'Gold Card', 'Silver Card'].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} className={`px-14 py-7 rounded-[2.5rem] font-black text-4xl uppercase transition-all ${activeTab === t ? 'bg-amber-500 text-black scale-110 shadow-2xl' : 'bg-slate-800 text-slate-400'}`}>{t.split(' ')[0]}</button>
                            ))}
                        </div>
                    </header>

                    <div className="card-grid glass">
                        {cards.filter(c => activeTab === 'ALL' || c.cat === activeTab).map(renderCard)}
                    </div>

                    {selected && (
                        <div className="fixed inset-0 z-50 bg-black/98 flex items-center justify-center p-4 backdrop-blur-3xl">
                            <div className="glass p-16 w-full max-w-5xl border-4 border-amber-500 rounded-[5rem]">
                                <h3 className="text-8xl font-black mb-12 border-b-4 border-slate-700 pb-10 text-amber-500 italic">BOOK: #{selected.n}</h3>
                                <form onSubmit={bookCard} className="space-y-12">
                                    <input name="Customer_Name" placeholder="पूरा नाम *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-5xl text-white" />
                                    <div className="grid md:grid-cols-2 gap-12">
                                        <input name="Mobile" type="tel" pattern="[0-9]{10}" placeholder="मोबाइल *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-5xl text-white" />
                                        <input name="Aadhaar" type="tel" pattern="[0-9]{12}" placeholder="आधार नंबर *" required className="w-full bg-slate-900 p-10 rounded-[2rem] font-bold border-4 border-slate-700 focus:border-amber-500 outline-none text-5xl text-white" />
                                    </div>
                                    <select required value={paymentMode} onChange={(e) => setPaymentMode(e.target.value)} className="w-full bg-slate-900 p-10 rounded-[2rem] font-black border-4 border-slate-700 text-5xl text-white outline-none">
                                        <option value="" disabled>पेमेंट मोड चुनें *</option>
                                        <option value="Cash">Cash (नकद)</option><option value="PhonePe/GPay">PhonePe / GPay</option><option value="Airtel Payment Bank">Airtel Payment Bank</option>
                                    </select>
                                    {paymentMode === 'Airtel Payment Bank' && <input name="PAN" placeholder="PAN CARD NUMBER *" required className="w-full bg-black p-10 rounded-[2rem] font-black border-8 border-red-500 text-6xl uppercase text-white text-center shadow-2xl" />}
                                    
                                    {/* Optional DOB & Village */}
                                    <div className="grid md:grid-cols-2 gap-12">
                                        <input name="DOB" type="date" className="w-full bg-slate-900 p-8 rounded-[2rem] border-4 border-slate-700 text-4xl text-slate-400" />
                                        <input name="Village" placeholder="गाँव का नाम" className="w-full bg-slate-900 p-8 rounded-[2rem] border-4 border-slate-700 text-4xl text-white" />
                                    </div>

                                    <div className="flex gap-12 pt-10">
                                        <button type="submit" className="flex-1 bg-amber-500 text-black font-black py-12 rounded-[3.5rem] text-6xl uppercase italic shadow-2xl hover:bg-white transition-all">Confirm Booking 🔱</button>
                                        <button type="button" onClick={() => setSelected(null)} className="bg-slate-700 text-white font-black px-20 py-12 rounded-[3.5rem] text-5xl">रद्द</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {successModal && (
                        <div className="fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4">
                            <div className="glass p-24 max-w-4xl text-center border-t-[15px] border-green-500 rounded-[5rem] shadow-2xl">
                                <i className="fa-regular fa-circle-check text-[15rem] text-green-500 mb-16 animate-bounce"></i>
                                <h3 className="text-7xl font-black mb-10">बुकिंग सुरक्षित है!</h3>
                                <p className="text-slate-300 text-4xl mb-20 font-bold leading-relaxed">हुकुम, कार्ड #{successModal.n} अब पेंडिंग में है। स्टाफ वेरिफिकेशन के बाद यह Sold हो जाएगा।</p>
                                <a href={`https://wa.me/917229874128?text=Jai Mata Di! Hukum, Card #${successModal.n} book kiya hai.`} target="_blank" onClick={()=>setSuccessModal(null)} className="flex items-center justify-center gap-10 w-full bg-[#25D366] text-white font-black py-12 rounded-[4rem] text-6xl shadow-2xl hover:scale-105 transition-transform">
                                    <i className="fa-brands fa-whatsapp text-9xl"></i> सूचित करें
                                </a>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
